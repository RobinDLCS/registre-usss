                          <strong>Durée décomptée :</strong> {formatDuree(min)}
                          {nuit && <span style={{ color:C.grey }}>
                            {" "}· service de nuit, fin le {formatDateFR(dateFinService(
                              pointageForm.date, pointageForm.heureDebut, pointageForm.heureFin))}
                          </span>}
                        </div>
                      );
                    })()}
                    <label style={{ display:"flex", flexDirection:"column", gap:4,
                      fontSize:11, fontWeight:600, color:C.grey }}>
                      Missions effectuées *
                      <textarea rows={3} value={pointageForm.missions}
                        placeholder="Ex. Convoi POTUS Vinewood → LSIA, escorte VIP étranger…"
                        style={{ ...inputStyle, resize:"vertical" }}
                        onChange={e => setPointageForm({ ...pointageForm, missions: e.target.value })} />
                    </label>
                    <label style={{ display:"flex", flexDirection:"column", gap:4,
                      fontSize:11, fontWeight:600, color:C.grey }}>
                      Résumé d'activité (optionnel)
                      <textarea rows={3} value={pointageForm.resume}
                        placeholder="Observations, incidents notables, faits marquants du service…"
                        style={{ ...inputStyle, resize:"vertical" }}
                        onChange={e => setPointageForm({ ...pointageForm, resume: e.target.value })} />
                    </label>
                    {pointageError && (
                      <p style={{ fontSize:11, fontWeight:600, color:C.red }}>{pointageError}</p>
                    )}
                    <div style={{ display:"flex", justifyContent:"flex-end" }}>
                      <button onClick={submitPointage} disabled={pointageBusy}
                        style={{ padding:"7px 18px", fontSize:13, fontWeight:600, borderRadius:2,
                          color:"#fff", background: pointageBusy ? "#7A93B5" : C.green }}>
                        {pointageBusy ? "Enregistrement…" : "Valider le pointage"}
                      </button>
                    </div>
                  </div>
                )}
              </section>

              {/* ── Historique des pointages ── */}
              <section style={{ display:"flex", flexDirection:"column", gap:12 }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                  flexWrap:"wrap", gap:12 }}>
                  <div style={{ display:"flex", alignItems:"baseline", gap:10, flexWrap:"wrap" }}>
                    <h2 style={{ fontSize:13, fontWeight:700, textTransform:"uppercase",
                      letterSpacing:"0.08em", color:C.navy }}>
                      Pointages enregistrés ({listeAffichee.length}{filtre && ` / ${pointages.length}`})
                    </h2>
                    {listeAffichee.length > 0 && (
                      <span style={{ fontSize:12, color:C.grey }}>
                        Total : <strong style={{ color:C.navy }}>{formatDuree(
                          listeAffichee.reduce((acc, p) => acc + dureeMinutes(p.heureDebut, p.heureFin), 0)
                        )}</strong>
                      </span>
                    )}
                  </div>
                  {editor && (
                    <input style={{ ...inputStyle, maxWidth:200 }}
                      placeholder="Filtrer par matricule (E-XX)"
                      value={filtreMat} onChange={e => setFiltreMat(e.target.value)} />
                  )}
                </div>

                {listeAffichee.length === 0 && (
                  <p style={{ padding:"24px 16px", fontSize:13, textAlign:"center",
                    color:C.grey, background:"#fff", borderRadius:6, border:`1px solid ${C.line}` }}>
                    {pointages.length === 0
                      ? "Aucun pointage enregistré pour l'instant."
                      : "Aucun pointage ne correspond au filtre."}
                  </p>
                )}

                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {listeAffichee.map(p => {
                    const matKey = normaliseMat(p.matricule);
                    const mb = members.find(x => normaliseMat(x.matricule) === matKey);
                    const peutSupprimer = editor ||
                      (agentLogged && normaliseMat(agentSession.matricule) === matKey);
                    const dureeMin = dureeMinutes(p.heureDebut, p.heureFin);
                    const nuit = p.heureFin <= p.heureDebut;
                    const dateFin = nuit
                      ? dateFinService(p.date, p.heureDebut, p.heureFin) : p.date;
                    return (
                      <article key={p.id} style={{ background:"#fff", borderRadius:6,
                        border:`1px solid ${C.line}`, borderLeft:`3px solid ${C.blue}`,
                        padding:"12px 16px" }}>
                        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                          gap:10, flexWrap:"wrap", marginBottom:6 }}>
                          <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                            <BadgeMatricule value={matKey} onClick={() => setFicheMat(matKey)} />
                            {mb && <span style={{ fontSize:12, color:C.grey }}>{mb.grade}</span>}
                            {mb && (mb.prenom || mb.nom) && (
                              <span style={{ fontSize:12, color:C.grey }}>
                                {`${mb.prenom} ${mb.nom}`.trim()}
                              </span>
                            )}
                          </div>
                          <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                            <span style={{ fontSize:12, fontFamily:"monospace", color:C.navy,
                              fontWeight:600 }}>
                              {nuit
                                ? `${formatDateFR(p.date)} ${p.heureDebut} → ${formatDateFR(dateFin)} ${p.heureFin}`
                                : `${formatDateFR(p.date)} · ${p.heureDebut} → ${p.heureFin}`}
                            </span>
                            <span style={{ fontSize:11, fontWeight:700, padding:"2px 8px",
                              borderRadius:2, background:C.gold, color:C.navyDeep }}>
                              {formatDuree(dureeMin)}
                            </span>
                            {peutSupprimer && (
                              <button onClick={() => removePointage(p.id)}
                                title="Supprimer ce pointage"
                                style={{ width:24, height:24, borderRadius:2, fontWeight:700,
                                  background:"#F7E8E8", color:C.red, fontSize:12 }}>✕</button>
                            )}
                          </div>
                        </div>
                        <div style={{ fontSize:13, color:C.ink, marginTop:4 }}>
                          <strong style={{ fontSize:11, textTransform:"uppercase",
                            letterSpacing:"0.05em", color:C.grey }}>Missions</strong>
                          <p style={{ marginTop:2, whiteSpace:"pre-wrap" }}>{p.missions}</p>
                        </div>
                        {p.resume && (
                          <div style={{ fontSize:13, color:C.ink, marginTop:8 }}>
                            <strong style={{ fontSize:11, textTransform:"uppercase",
                              letterSpacing:"0.05em", color:C.grey }}>Résumé</strong>
                            <p style={{ marginTop:2, whiteSpace:"pre-wrap", color:C.grey }}>{p.resume}</p>
                          </div>
                        )}
                      </article>
                    );
                  })}
                </div>
              </section>
            </div>
          );
        })()}

        {pageEffective === "recap" && editor && (() => {
          const dimSel = dimancheISO(lundiSelect);
          const dansSemaine = pointages.filter(p => lundiDeLaSemaine(p.date) === lundiSelect);
          const totauxParMat = {};
          dansSemaine.forEach(p => {
            const key = normaliseMat(p.matricule);
            totauxParMat[key] = (totauxParMat[key] || 0)
              + dureeMinutes(p.heureDebut, p.heureFin);
          });
          const totalGlobal = Object.values(totauxParMat).reduce((a, b) => a + b, 0);
          const semaineCourante = lundiSelect === lundiDeLaSemaine(todayISO);
          // Tri : agents avec heures en tête (desc), puis le reste par grade
          const sortedRecap = sortMembers(members).slice().sort((a, b) => {
            const ha = totauxParMat[normaliseMat(a.matricule)] || 0;
            const hb = totauxParMat[normaliseMat(b.matricule)] || 0;
            return hb - ha;
          });
          return (
            <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
              <section style={{ background:"#fff", borderRadius:6, padding:16,
                border:`1px solid ${C.line}`, display:"flex", alignItems:"center",
                justifyContent:"space-between", gap:12, flexWrap:"wrap" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <button onClick={() => setLundiSelect(decaleSemaine(lundiSelect, -1))}
                    style={{ width:32, height:32, borderRadius:2, fontWeight:700,
                      background:C.blueSoft, color:C.blue, border:`1px solid ${C.line}` }}>◀</button>
                  <div style={{ minWidth:220, textAlign:"center" }}>
                    <div style={{ fontSize:11, textTransform:"uppercase",
                      letterSpacing:"0.08em", color:C.grey }}>
                      Semaine{semaineCourante && " en cours"}</div>
                    <div style={{ fontSize:14, fontWeight:700, color:C.navy }}>
                      {formatDateFR(lundiSelect)} → {formatDateFR(dimSel)}
                    </div>
                  </div>
                  <button onClick={() => setLundiSelect(decaleSemaine(lundiSelect, 1))}
                    style={{ width:32, height:32, borderRadius:2, fontWeight:700,
                      background:C.blueSoft, color:C.blue, border:`1px solid ${C.line}` }}>▶</button>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  {!semaineCourante && (
                    <button onClick={() => setLundiSelect(lundiDeLaSemaine(todayISO))}
                      style={{ padding:"6px 12px", fontSize:12, borderRadius:2, fontWeight:600,
                        background:"#fff", color:C.blue, border:`1px solid ${C.line}` }}>
                      Semaine actuelle</button>
                  )}
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontSize:11, textTransform:"uppercase",
                      letterSpacing:"0.08em", color:C.grey }}>Total cumulé</div>
                    <div style={{ fontSize:18, fontWeight:700, color:C.navy }}>
                      {formatDuree(totalGlobal)}</div>
                  </div>
                </div>
              </section>

              <div style={{ background:"#fff", borderRadius:6, overflowX:"auto",
                border:`1px solid ${C.line}` }}>
                <table style={{ width:"100%", fontSize:13 }}>
                  <thead>
                    <tr style={{ background:C.navy }}>
                      {["Matricule","IBAN","Grade","Statut","Services","Heures"].map(h => (
                        <th key={h} style={{ padding:"8px 12px", textAlign:"left", fontSize:11,
                          textTransform:"uppercase", letterSpacing:"0.05em", color:"#fff",
                          whiteSpace:"nowrap" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {sortedRecap.map((m, idx) => {
                      const matKey = normaliseMat(m.matricule);
                      const min = totauxParMat[matKey] || 0;
                      const nb = dansSemaine.filter(p => normaliseMat(p.matricule) === matKey).length;
                      const zero = min === 0;
                      return (
                        <tr key={m.matricule} style={{ borderTop:`1px solid ${C.line}`,
                          background: idx % 2 ? "#FAFBFD" : "#fff", opacity: zero ? 0.55 : 1 }}>
                          <td style={{ padding:"8px 12px" }}>
                            <BadgeMatricule value={m.matricule} onClick={() => setFicheMat(m.matricule)} />
                          </td>
                          <td style={{ padding:"8px 12px", fontFamily:"monospace", fontSize:12,
                            color: m.iban ? C.ink : C.grey }}>
                            {m.iban || "—"}
                          </td>
                          <td style={{ padding:"8px 12px", whiteSpace:"nowrap", fontSize:12 }}>{m.grade}</td>
                          <td style={{ padding:"8px 12px" }}>
                            <StatutPill statut={m.statut} readonly /></td>
                          <td style={{ padding:"8px 12px", fontFamily:"monospace", fontSize:12, color:C.grey }}>
                            {nb === 0 ? "—" : nb + (nb > 1 ? " services" : " service")}
                          </td>
                          <td style={{ padding:"8px 12px" }}>
                            <span style={{ fontWeight:700, fontSize:13,
                              color: zero ? C.grey : C.navy }}>{formatDuree(min)}</span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <p style={{ fontSize:11, color:C.grey }}>
                Comptabilisation des services dont la <strong>date de prise de service</strong>
                appartient à la semaine sélectionnée (lundi 00h00 → dimanche 23h59). Un service
                de nuit est entièrement comptabilisé dans la semaine de son démarrage, même s'il
                déborde sur le lundi suivant. Clique sur un matricule pour ouvrir la fiche agent
                ; pour supprimer un pointage aberrant, va dans l'onglet Pointeuse et filtre par
                matricule.
              </p>
            </div>
          );
        })()}

        {pageEffective === "rapports" && (() => {
          // Agent : ses propres rapports (brouillons + soumis)
          // Éditeur : tous les rapports soumis (les brouillons des autres restent privés)
          let liste;
          if (editor) {
            liste = rapports.filter(r => r.etat === "soumis");
            if (filtreRedacteur.trim()) {
              const f = normaliseMat(filtreRedacteur);
              liste = liste.filter(r => normaliseMat(r.redacteurMat).includes(f));
            }
          } else if (agentLogged) {
            liste = rapports.filter(r =>
              normaliseMat(r.redacteurMat) === normaliseMat(agentSession.matricule));
          } else {
            liste = [];
          }
          return (
            <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                flexWrap:"wrap", gap:12 }}>
                <h2 style={{ fontSize:13, fontWeight:700, textTransform:"uppercase",
                  letterSpacing:"0.08em", color:C.navy }}>
                  {editor ? `Rapports soumis (${liste.length})` : `Mes rapports (${liste.length})`}
                </h2>
                <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                  {editor && (
                    <input style={{ ...inputStyle, maxWidth:200 }}
                      placeholder="Filtrer par rédacteur (E-XX)"
                      value={filtreRedacteur}
                      onChange={e => setFiltreRedacteur(e.target.value)} />
                  )}
                  {agentLogged && (
                    <button onClick={nouveauRapport}
                      style={{ padding:"6px 16px", fontSize:13, borderRadius:2,
                        fontWeight:600, color:"#fff", background:C.green }}>
                      + Nouveau rapport</button>
                  )}
                </div>
              </div>

              {liste.length === 0 && (
                <p style={{ padding:"24px 16px", fontSize:13, textAlign:"center",
                  color:C.grey, background:"#fff", borderRadius:6,
                  border:`1px solid ${C.line}` }}>
                  {editor ? "Aucun rapport soumis pour l'instant."
                    : "Aucun rapport pour l'instant. Crée ton premier rapport via le bouton ci-dessus."}
                </p>
              )}

              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {liste.map(r => {
                  const cibleAg = members.find(m => normaliseMat(m.matricule) === normaliseMat(r.cibleAgentMat));
                  const cibleTexte = r.cibleAgentMat
                    ? `Agent visé : ${r.cibleAgentMat}${cibleAg ? ` (${cibleAg.grade})` : ""}`
                    : (r.cibleCitoyenPrenom || r.cibleCitoyenNom)
                      ? `Citoyen : ${r.cibleCitoyenPrenom} ${r.cibleCitoyenNom}`.trim()
                      : "Sans cible désignée";
                  const estBrouillon = r.etat === "brouillon";
                  return (
                    <article key={r.id} style={{ background:"#fff", borderRadius:6,
                      border:`1px solid ${C.line}`,
                      borderLeft:`3px solid ${estBrouillon ? C.amber : C.green}`,
                      padding:"12px 16px" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:10,
                        flexWrap:"wrap", marginBottom:6 }}>
                        <span style={{ fontSize:11, fontWeight:700, padding:"2px 8px",
                          borderRadius:2, color:"#fff",
                          background: estBrouillon ? C.amber : C.green,
                          textTransform:"uppercase", letterSpacing:"0.05em" }}>
                          {estBrouillon ? "Brouillon" : r.numero}
                        </span>
                        <BadgeMatricule value={r.redacteurMat} />
                        <span style={{ fontSize:12, color:C.grey }}>
                          {r.redacteurGrade}
                        </span>
                        <span style={{ fontSize:12, color:C.grey, marginLeft:"auto" }}>
                          {estBrouillon
                            ? `Créé le ${r.dateCreation}`
                            : `Soumis le ${r.dateSoumission}`}
                        </span>
                      </div>
                      <p style={{ fontSize:13, color:C.ink, marginBottom:8 }}>{cibleTexte}</p>
                      <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                        {estBrouillon && agentLogged && (
                          <button onClick={() => { setRapportEdit(r); setRapportError(""); }}
                            style={{ padding:"4px 12px", fontSize:11, borderRadius:2,
                              fontWeight:600, background:C.blueSoft, color:C.blue,
                              border:`1px solid ${C.line}` }}>✎ Continuer</button>
                        )}
                        {!estBrouillon && (
                          <button onClick={() => setRapportView(r)}
                            style={{ padding:"4px 12px", fontSize:11, borderRadius:2,
                              fontWeight:600, background:C.navy, color:"#fff" }}>
                            👁 Consulter</button>
                        )}
                        {(estBrouillon || editor) && (
                          confirmDeleteRap === r.id ? (
                            <button onClick={() => supprimerRapport(r.id)}
                              style={{ padding:"4px 10px", fontSize:11, borderRadius:2,
                                fontWeight:700, color:"#fff", background:C.red }}>
                              Confirmer ?</button>
                          ) : (
                            <button onClick={() => setConfirmDeleteRap(r.id)}
                              style={{ padding:"4px 10px", fontSize:11, borderRadius:2,
                                fontWeight:600, background:"#F7E8E8", color:C.red }}>
                              ✕ Supprimer</button>
                          )
                        )}
                      </div>
                    </article>
                  );
                })}
              </div>
              {editor && (
                <p style={{ fontSize:11, color:C.grey }}>
                  Les rapports en brouillon des agents ne sont visibles que par eux. Tu ne vois
                  ici que les rapports formellement soumis. Tu peux les exporter en PNG ou PDF,
                  et supprimer un rapport en cas d'erreur (l'agent devra le rédiger à nouveau).
                </p>
              )}
            </div>
          );
        })()}

        {pageEffective === "carte" && (
          <CarteInteractive
            role={editor ? "superviseur" : "agent"}
            identifiant={editor ? (session && session.login) : (agentSession && agentSession.matricule)}
            token={editor ? (session && session.token) : (agentSession && agentSession.token)}
          />
        )}

        {pageEffective === "journal" && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
              flexWrap:"wrap", gap:12 }}>
              <h2 style={{ fontSize:13, fontWeight:700, textTransform:"uppercase",
                letterSpacing:"0.08em", color:C.navy }}>Journal des opérations ({logs.length})</h2>
              {editor && logs.length > 0 && (
                <button onClick={() => restoreFrom(logs[0])}
                  style={{ padding:"6px 16px", fontSize:13, borderRadius:2, fontWeight:600,
                    color:"#fff", background:C.blue }}>↩ Annuler la dernière action</button>
              )}
            </div>

            <div style={{ background:"#fff", borderRadius:6, border:`1px solid ${C.line}` }}>
              {logs.length === 0 && (
                <p style={{ padding:"24px 16px", fontSize:13, textAlign:"center", color:C.grey }}>
                  Aucune opération enregistrée pour l'instant.
                </p>
              )}
              {logs.map((entry, idx) => (
                <div key={entry.id} style={{ display:"flex", alignItems:"center",
                  justifyContent:"space-between", gap:12, padding:"10px 16px", flexWrap:"wrap",
                  borderTop: idx === 0 ? "none" : `1px solid ${C.line}`,
                  background: idx % 2 ? "#FAFBFD" : "#fff" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:12, minWidth:0, flexWrap:"wrap" }}>
                    <span style={{ fontSize:11, fontFamily:"monospace",
                      whiteSpace:"nowrap", color:C.grey }}>{entry.date}</span>
                    {entry.auteur && (
                      <span style={{ fontSize:11, fontWeight:600, padding:"1px 6px",
                        borderRadius:2, background:C.blueSoft, color:C.blue }}>{entry.auteur}</span>
                    )}
                    <span style={{ fontSize:13, fontWeight:500,
                      color: entry.action.startsWith("↩") ? C.blue : C.ink }}>{entry.action}</span>
                  </div>
                  {editor && (
                    <button onClick={() => restoreFrom(entry)}
                      title="Restaurer le registre tel qu'il était AVANT cette action"
                      style={{ padding:"4px 12px", fontSize:11, borderRadius:2, fontWeight:600,
                        whiteSpace:"nowrap", background:C.blueSoft, color:C.blue,
                        border:`1px solid ${C.line}` }}>Revenir avant</button>
                  )}
                </div>
              ))}
            </div>
            <p style={{ fontSize:11, color:C.grey }}>
              « Revenir avant » restaure le registre dans l'état où il se trouvait juste avant l'action
              concernée (les actions plus récentes sont donc annulées). Une restauration est elle-même
              journalisée. Le journal conserve les {MAX_LOGS} dernières opérations.
            </p>
          </div>
        )}
      </main>

      {/* ── Fiche agent ── */}
      {fiche && (
        <div style={{ position:"fixed", inset:0, display:"flex", alignItems:"center",
          justifyContent:"center", padding:16, zIndex:50, background:"rgba(9,24,48,0.55)" }}
          onClick={() => setFicheMat(null)}>
          <div style={{ background:"#fff", borderRadius:6, width:"100%", maxWidth:640,
            maxHeight:"85vh", overflowY:"auto", padding:20,
            borderTop:`4px solid ${C.gold}` }}
            onClick={e => e.stopPropagation()}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
              gap:12, flexWrap:"wrap" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <BadgeMatricule value={fiche.matricule} />
                <div>
                  <div style={{ fontWeight:700, fontSize:15 }}>
                    {(fiche.prenom || fiche.nom) ? `${fiche.prenom} ${fiche.nom}`.trim() : "Identité non renseignée"}
                  </div>
                  <div style={{ fontSize:12, color:C.grey }}>{fiche.grade}</div>
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <StatutPill statut={fiche.statut} readonly={!editor}
                  onCycle={() => cycleStatut(fiche.matricule)} />
                <button onClick={() => setFicheMat(null)}
                  style={{ width:28, height:28, borderRadius:2, fontWeight:700,
                    background:"#F6F7F9", color:C.grey, border:`1px solid ${C.line}` }}>✕</button>
              </div>
            </div>

            <SectionTitle>Aptitudes opérationnelles</SectionTitle>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {APTITUDES.map(([label, test]) => (
                <ApteBadge key={label} ok={test(fiche)} label={label} />
              ))}
            </div>

            <SectionTitle>Qualifications</SectionTitle>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(160px, 1fr))", gap:6 }}>
              {ALL_BOOL.map(([k, label]) => (
                <div key={k} style={{ display:"flex", alignItems:"center", gap:8, fontSize:13 }}>
                  <BoolCell value={fiche[k]} readonly={!editor}
                    onToggle={() => toggleBool(fiche.matricule, k)} />
                  <span style={{ color: fiche[k] ? C.ink : C.grey }}>{label}</span>
                </div>
              ))}
            </div>

            <SectionTitle>Informations personnelles</SectionTitle>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(180px, 1fr))", gap:10 }}>
              {PERSO_FIELDS.map(([k, label]) => (
                <label key={k} style={{ display:"flex", flexDirection:"column", gap:3,
                  fontSize:11, fontWeight:600, color:C.grey }}>
                  {label}
                  {editor ? (
                    <input style={inputStyle} defaultValue={fiche[k]} placeholder="—"
                      onBlur={e => { if (e.target.value !== fiche[k]) setPerso(fiche.matricule, k, e.target.value); }} />
                  ) : (
                    <span style={{ fontSize:13, fontWeight:400, color: fiche[k] ? C.ink : C.grey }}>
                      {fiche[k] || "—"}</span>
                  )}
                </label>
              ))}
            </div>

            <SectionTitle>Supervision — rapports d'incident ({(fiche.rapports || []).length})</SectionTitle>
            {editor && (
              <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:10 }}>
                <textarea value={rapportTexte} rows={3}

                <button onClick={addRapport} disabled={!rapportTexte.trim()}
                  style={{ alignSelf:"flex-end", padding:"5px 14px", fontSize:12,

            )}
            {(fiche.rapports || []).length === 0 && (
              <p style={{ fontSize:12, color:C.grey }}>Aucun rapport — dossier disciplinaire vierge.</p>
            )}
            {(fiche.rapports || []).map(r => (
              <div key={r.id} style={{ borderLeft:`3px solid ${C.red}`, background:"#FCF7F7",
                borderRadius:"0 3px 3px 0", padding:"8px 12px", marginBottom:6 }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:8 }}>
                  <span style={{ fontSize:11, color:C.grey }}>
                    {r.date} — <strong style={{ color:C.red }}>{r.auteur}</strong></span>

                    <button onClick={() => deleteRapport(r.id)} title="Supprimer ce rapport"
                      style={{ fontSize:11, background:"transparent", color:C.grey }}>✕</button>
                  )}
                </div>
                <p style={{ fontSize:13, marginTop:4, whiteSpace:"pre-wrap" }}>{r.texte}</p>
              </div>
            ))}

            <SectionTitle>Historique ({ficheLogs.length})</SectionTitle>
            {ficheLogs.length === 0 && (
              <p style={{ fontSize:12, color:C.grey }}>Aucune opération récente concernant cet agent.</p>

              {ficheLogs.slice(0, 15).map(l => (
                <div key={l.id} style={{ fontSize:12, display:"flex", gap:8, flexWrap:"wrap" }}>
                  <span style={{ fontFamily:"monospace", color:C.grey, whiteSpace:"nowrap" }}>{l.date}</span>
                  {l.auteur && <span style={{ fontWeight:600, color:C.blue }}>{l.auteur}</span>}
                  <span>{l.action}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── Modale connexion ── */}
      {showLogin && (
        <div style={{ position:"fixed", inset:0, display:"flex", alignItems:"center",
          justifyContent:"center", padding:16, zIndex:60, background:"rgba(9,24,48,0.55)" }}
          onClick={() => setShowLogin(false)}>
          <div style={{ background:"#fff", borderRadius:6, width:"100%", maxWidth:340,
            padding:20, display:"flex", flexDirection:"column", gap:12,
            borderTop:`4px solid ${C.gold}` }}
            onClick={e => e.stopPropagation()}>
            <h2 style={{ fontWeight:700, textTransform:"uppercase",
              letterSpacing:"0.08em", fontSize:13, color:C.navy }}>Connexion éditeur</h2>
            <label style={{ display:"flex", flexDirection:"column", gap:4,
              fontSize:11, fontWeight:600, color:C.grey }}>
              Identifiant
              <input style={inputStyle} value={loginForm.login} autoFocus
                onChange={e => setLoginForm({ ...loginForm, login: e.target.value })}
                onKeyDown={e => { if (e.key === "Enter") doLogin(); }} />
            </label>
            <label style={{ display:"flex", flexDirection:"column", gap:4,
              fontSize:11, fontWeight:600, color:C.grey }}>
              Mot de passe
              <input style={inputStyle} type="password" value={loginForm.password}
                onChange={e => setLoginForm({ ...loginForm, password: e.target.value })}
                onKeyDown={e => { if (e.key === "Enter") doLogin(); }} />
            </label>
            {loginError && <p style={{ fontSize:11, fontWeight:600, color:C.red }}>{loginError}</p>}
            <div style={{ display:"flex", justifyContent:"flex-end", gap:8 }}>
              <button onClick={() => setShowLogin(false)}
                style={{ padding:"6px 16px", fontSize:13, borderRadius:2,
                  border:`1px solid ${C.line}`, background:"#fff", color:C.grey }}>Annuler</button>
              <button onClick={doLogin} disabled={loginBusy}

                  color:"#fff", background: loginBusy ? "#7A93B5" : C.blue }}>
                {loginBusy ? "Vérification…" : "Se connecter"}</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Modale connexion agent ── */}
      {showAgentLogin && (
        <div style={{ position:"fixed", inset:0, display:"flex", alignItems:"center",
          justifyContent:"center", padding:16, zIndex:60, background:"rgba(9,24,48,0.55)" }}
          onClick={() => setShowAgentLogin(false)}>
          <div style={{ background:"#fff", borderRadius:6, width:"100%", maxWidth:340,
            padding:20, display:"flex", flexDirection:"column", gap:12,
            borderTop:`4px solid ${C.gold}` }}
            onClick={e => e.stopPropagation()}>
            <h2 style={{ fontWeight:700, textTransform:"uppercase",
              letterSpacing:"0.08em", fontSize:13, color:C.navy }}>Connexion agent</h2>
            <label style={{ display:"flex", flexDirection:"column", gap:4,
              fontSize:11, fontWeight:600, color:C.grey }}>

            <label style={{ display:"flex", flexDirection:"column", gap:4,
              fontSize:11, fontWeight:600, color:C.grey }}>
              Mot de passe
              <input style={inputStyle} type="password" value={agentLoginForm.password}

              <button onClick={doLoginAgent} disabled={agentLoginBusy}

                  color:"#fff", background: agentLoginBusy ? "#7A93B5" : C.blue }}>
                {agentLoginBusy ? "Vérification…" : "Pointer entrée"}</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Modale édition de rapport ── */}
      {rapportEdit && (() => {
        const r = rapportEdit;
        const setR = (patch) => setRapportEdit({ ...r, ...patch });
        const onCibleAgentChange = (mat) => {
          const m = members.find(x => normaliseMat(x.matricule) === normaliseMat(mat));
          setR({ cibleAgentMat: mat, cibleAgentGrade: m ? m.grade : "" });
        };
        return (
          <div style={{ position:"fixed", inset:0, padding:16, zIndex:55,
            background:"rgba(9,24,48,0.55)", overflowY:"auto" }}>
            <div style={{ background:"#fff", borderRadius:6, maxWidth:720, margin:"20px auto",
              padding:24, display:"flex", flexDirection:"column", gap:14,
              borderTop:`4px solid ${C.gold}` }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                gap:10, flexWrap:"wrap" }}>
                <h2 style={{ fontSize:14, fontWeight:700, textTransform:"uppercase",
                  letterSpacing:"0.08em", color:C.navy }}>
                  Rédaction d'un rapport — Brouillon</h2>
                <button onClick={() => { setRapportEdit(null); setRapportError(""); }}
                  style={{ width:28, height:28, borderRadius:2, fontWeight:700,
                    background:"#F6F7F9", color:C.grey,
                    border:`1px solid ${C.line}` }}>✕</button>
              </div>

              <SectionTitle>Agent rédacteur</SectionTitle>
              <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                <BadgeMatricule value={r.redacteurMat || "—"} />

              </div>

              <SectionTitle>Agent visé (optionnel)</SectionTitle>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>

                  fontSize:11, fontWeight:600, color:C.grey }}>
                  Matricule
                  <select style={inputStyle} value={r.cibleAgentMat}
                    onChange={e => onCibleAgentChange(e.target.value)}>
                    <option value="">— Aucun —</option>
                    {sortMembers(members).map(m => (
                      <option key={m.matricule} value={m.matricule}>
                        {m.matricule} — {m.grade}
                      </option>
                    ))}
                  </select>
                </label>
                <label style={{ display:"flex", flexDirection:"column", gap:4,
                  fontSize:11, fontWeight:600, color:C.grey }}>
                  Grade (auto)
                  <input style={{ ...inputStyle, background:"#F6F7F9" }}
                    value={r.cibleAgentGrade} readOnly />
                </label>
              </div>

              <SectionTitle>Citoyen visé (optionnel)</SectionTitle>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <label style={{ display:"flex", flexDirection:"column", gap:4,
                  fontSize:11, fontWeight:600, color:C.grey }}>
                  Prénom
                  <input style={inputStyle} value={r.cibleCitoyenPrenom}
                    onChange={e => setR({ cibleCitoyenPrenom: e.target.value })} />
                </label>
                <label style={{ display:"flex", flexDirection:"column", gap:4,
                  fontSize:11, fontWeight:600, color:C.grey }}>
                  Nom
                  <input style={inputStyle} value={r.cibleCitoyenNom}
                    onChange={e => setR({ cibleCitoyenNom: e.target.value })} />
                </label>
              </div>

              <SectionTitle>I — Contextualisation</SectionTitle>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <label style={{ display:"flex", flexDirection:"column", gap:4,
                  fontSize:11, fontWeight:600, color:C.grey }}>
                  Localisation
                  <input style={inputStyle} value={r.localisation}
                    placeholder="Ex. Vinewood Bvd, Los Santos"
                    onChange={e => setR({ localisation: e.target.value })} />
                </label>
                <label style={{ display:"flex", flexDirection:"column", gap:4,
                  fontSize:11, fontWeight:600, color:C.grey }}>
                  Date et horaire
                  <input style={inputStyle} value={r.dateHeureFait}
                    placeholder="Ex. 12/06/2026 à 18h30"
                    onChange={e => setR({ dateHeureFait: e.target.value })} />
                </label>
              </div>

              <SectionTitle>II — Énonciation des faits</SectionTitle>
              <label style={{ display:"flex", flexDirection:"column", gap:4,
                fontSize:11, fontWeight:600, color:C.grey }}>
                Contexte
                <textarea rows={4} value={r.contexte}
                  style={{ ...inputStyle, resize:"vertical" }}
                  placeholder="Description des circonstances entourant les faits…"
                  onChange={e => setR({ contexte: e.target.value })} />
              </label>
              <label style={{ display:"flex", flexDirection:"column", gap:4,
                fontSize:11, fontWeight:600, color:C.grey }}>
                Faits reprochés
                <textarea rows={5} value={r.faitsReproches}
                  style={{ ...inputStyle, resize:"vertical" }}
                  placeholder="Exposé détaillé et chronologique des faits…"
                  onChange={e => setR({ faitsReproches: e.target.value })} />
              </label>
              <label style={{ display:"flex", flexDirection:"column", gap:4,
                fontSize:11, fontWeight:600, color:C.grey }}>
                Autres incidents (optionnel)
                <textarea rows={3} value={r.autresIncidents}
                  style={{ ...inputStyle, resize:"vertical" }}
                  placeholder="Élements complémentaires éventuels…"
                  onChange={e => setR({ autresIncidents: e.target.value })} />
              </label>

              {rapportError && (
                <p style={{ fontSize:12, fontWeight:600, color:C.red,
                  background:"#FBEDED", padding:"8px 12px", borderRadius:3 }}>
                  {rapportError}
                </p>
              )}

              <div style={{ display:"flex", justifyContent:"space-between", gap:8,
                flexWrap:"wrap", paddingTop:8, borderTop:`1px solid ${C.line}` }}>
                <button onClick={() => { setRapportEdit(null); setRapportError(""); }}
                  disabled={rapportBusy}
                  style={{ padding:"7px 16px", fontSize:13, borderRadius:2,
                    border:`1px solid ${C.line}`, background:"#fff", color:C.grey }}>
                  Fermer sans sauvegarder</button>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={saveBrouillon} disabled={rapportBusy}
                    style={{ padding:"7px 16px", fontSize:13, fontWeight:600, borderRadius:2,
                      background:C.blueSoft, color:C.blue,
                      border:`1px solid ${C.line}` }}>
                    {rapportBusy ? "…" : "💾 Sauver brouillon"}</button>
                  <button onClick={() => setConfirmSubmit(true)} disabled={rapportBusy}
                    style={{ padding:"7px 16px", fontSize:13, fontWeight:600, borderRadius:2,
                      color:"#fff", background: rapportBusy ? "#7A93B5" : C.red }}>
                    📤 Soumettre</button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── Confirmation de soumission ── */}
      {confirmSubmit && rapportEdit && (
        <div style={{ position:"fixed", inset:0, display:"flex", alignItems:"center",
          justifyContent:"center", padding:16, zIndex:65, background:"rgba(9,24,48,0.7)" }}
          onClick={() => setConfirmSubmit(false)}>
          <div style={{ background:"#fff", borderRadius:6, width:"100%", maxWidth:380,
            padding:20, display:"flex", flexDirection:"column", gap:12,
            borderTop:`4px solid ${C.red}` }}
            onClick={e => e.stopPropagation()}>
            <h2 style={{ fontSize:13, fontWeight:700, textTransform:"uppercase",
              letterSpacing:"0.08em", color:C.red }}>⚠ Soumission définitive</h2>
            <p style={{ fontSize:13, color:C.ink, lineHeight:1.5 }}>
              Une fois soumis, ce rapport sera verrouillé : tu ne pourras plus le modifier.
              Il sera transmis à la supervision avec un numéro d'archive officiel.
            </p>
            <div style={{ display:"flex", justifyContent:"flex-end", gap:8 }}>
              <button onClick={() => setConfirmSubmit(false)}
                style={{ padding:"6px 16px", fontSize:13, borderRadius:2,
                  border:`1px solid ${C.line}`, background:"#fff", color:C.grey }}>
                Continuer le brouillon</button>
              <button onClick={soumettreRapport} disabled={rapportBusy}
                style={{ padding:"6px 16px", fontSize:13, borderRadius:2, fontWeight:600,
                  color:"#fff", background: rapportBusy ? "#7A93B5" : C.red }}>
                {rapportBusy ? "Soumission…" : "Confirmer la soumission"}</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Modale de visualisation + export ── */}
      {rapportView && (() => {
        const r = rapportView;
        const cibleAg = members.find(m => normaliseMat(m.matricule) === normaliseMat(r.cibleAgentMat));
        const auteur = members.find(m => normaliseMat(m.matricule) === normaliseMat(r.redacteurMat));
        const aCible = !!r.cibleAgentMat;
        const aCitoyen = !!(r.cibleCitoyenPrenom || r.cibleCitoyenNom);
        const Box = ({ children }) => (
          <div style={{ border:"1px solid #1A2A4A", borderRadius:2, overflow:"hidden",
            margin:"8px 0" }}>{children}</div>
        );
        const Th = ({ children }) => (
          <div style={{ background:"#0E2240", color:"#fff", fontWeight:700,
            padding:"8px 14px", fontSize:13, textAlign:"center" }}>{children}</div>
        );
        const Td = ({ children }) => (
          <div style={{ padding:"10px 14px", fontSize:13, textAlign:"center",
            background:"#fff", minHeight:36 }}>{children || "\u00A0"}</div>
        );
        const Banner = ({ children, color }) => (
          <div style={{ background:color, color:"#fff", textAlign:"center",
            padding:"10px 14px", fontSize:15, fontWeight:700, letterSpacing:"0.06em",
            textTransform:"uppercase", margin:"14px 0 10px" }}>{children}</div>
        );
        return (
          <div style={{ position:"fixed", inset:0, padding:16, zIndex:55,
            background:"rgba(9,24,48,0.7)", overflowY:"auto" }}
            onClick={() => setRapportView(null)}>
            <div style={{ maxWidth:820, margin:"20px auto", display:"flex",
              flexDirection:"column", gap:10 }}
              onClick={e => e.stopPropagation()}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                gap:8, flexWrap:"wrap", background:C.navy, padding:"10px 14px", borderRadius:4 }}>
                <span style={{ color:"#fff", fontWeight:700, fontSize:13 }}>
                  {r.numero || "Brouillon"}</span>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => exportRapport("png")}
                    style={{ padding:"6px 14px", fontSize:12, fontWeight:600, borderRadius:2,
                      background:C.gold, color:C.navyDeep }}>📷 PNG</button>
                  <button onClick={() => exportRapport("pdf")}
                    style={{ padding:"6px 14px", fontSize:12, fontWeight:600, borderRadius:2,
                      background:"#fff", color:C.navy }}>📄 PDF</button>
                  <button onClick={() => setRapportView(null)}
                    style={{ padding:"6px 14px", fontSize:12, fontWeight:600, borderRadius:2,
                      background:"transparent", color:"#fff",
                      border:"1px solid #2C456B" }}>Fermer</button>
                </div>
              </div>

              {/* Document imprimable */}
              <div id="rapport-printable" style={{ background:"#fff", padding:"40px 50px",
                color:"#1A2433",
                fontFamily:"'Montserrat', 'Segoe UI', Arial, sans-serif",
                fontWeight:500,
                width:"100%" }}>
                {/* En-tête */}
                <div style={{ textAlign:"center", marginBottom:20 }}>
                  <img src={LOGO_USSS} alt="USSS"
                    style={{ maxWidth:380, width:"100%", height:"auto" }} />
                  <div style={{ fontSize:18, marginTop:14, color:"#1A2433",
                    letterSpacing:"0.05em", fontWeight:500 }}>— RAPPORT —</div>
                </div>

                <Banner color="#0E2240">Confidential — Supervision use only</Banner>

                <div style={{ fontSize:13, fontWeight:700, textDecoration:"underline",
                  textAlign:"center", margin:"14px 0 4px" }}>Agent rédacteur</div>
                <Box>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr",
                    borderBottom:"1px solid #1A2A4A" }}>
                    <Th>Matricule</Th><Th>Grade</Th>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr",
                    borderTop:"1px solid #D6DEE8" }}>
                    <Td>{r.redacteurMat}</Td><Td>{r.redacteurGrade || (auteur && auteur.grade)}</Td>
                  </div>
                </Box>

                {aCible && (
                  <>
                    <div style={{ fontSize:13, fontWeight:700, textDecoration:"underline",
                      textAlign:"center", margin:"14px 0 4px" }}>Agent visé</div>
                    <Box>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr",
                        borderBottom:"1px solid #1A2A4A" }}>
                        <Th>Matricule</Th><Th>Grade</Th>
                      </div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr" }}>
                        <Td>{r.cibleAgentMat}</Td><Td>{r.cibleAgentGrade || (cibleAg && cibleAg.grade)}</Td>
                      </div>
                    </Box>
                  </>
                )}

                {aCitoyen && (
                  <>
                    <div style={{ fontSize:13, fontWeight:700, textDecoration:"underline",
                      textAlign:"center", margin:"14px 0 4px" }}>Citoyen visé</div>
                    <Box>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr",
                        borderBottom:"1px solid #1A2A4A" }}>
                        <Th>Prénom</Th><Th>Nom</Th>
                      </div>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr" }}>
                        <Td>{r.cibleCitoyenPrenom}</Td><Td>{r.cibleCitoyenNom}</Td>
                      </div>
                    </Box>
                  </>
                )}

                <Banner color="#0E2240">Partie I — Contextualisation</Banner>
                <Box>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr",
                    borderBottom:"1px solid #1A2A4A" }}>
                    <Th>Localisation</Th><Th>Date et horaire</Th>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr" }}>
                    <Td>{r.localisation}</Td><Td>{r.dateHeureFait}</Td>
                  </div>
                </Box>

                <Banner color="#0E2240">Partie II — Énonciation des faits</Banner>
                {r.contexte && (
                  <>
                    <Banner color="#B22222">Contexte</Banner>
                    <p style={{ fontSize:13, lineHeight:1.6, whiteSpace:"pre-wrap",
                      margin:"4px 4px 14px" }}>{r.contexte}</p>
                  </>
                )}
                {r.faitsReproches && (
                  <>
                    <Banner color="#B22222">Faits reprochés</Banner>
                    <p style={{ fontSize:13, lineHeight:1.6, whiteSpace:"pre-wrap",
                      margin:"4px 4px 14px" }}>{r.faitsReproches}</p>
                  </>
                )}
                {r.autresIncidents && (
                  <>
                    <Banner color="#B22222">Autres incidents</Banner>
                    <p style={{ fontSize:13, lineHeight:1.6, whiteSpace:"pre-wrap",
                      margin:"4px 4px 14px" }}>{r.autresIncidents}</p>
                  </>
                )}

                <div style={{ marginTop:50, paddingTop:14,
                  borderTop:"1px solid #D6DEE8", fontSize:12, color:"#6B7686",
                  display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
                  <span>
                    <em>Signature : </em>
                    <strong style={{ color:"#0E2240" }}>{r.redacteurMat}</strong>
                  </span>
                  {r.dateSoumission && (
                    <span><em>Soumis le </em>{r.dateSoumission}</span>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── Modale recrutement ── */}
      {showAdd && editor && (
        <div style={{ position:"fixed", inset:0, display:"flex", alignItems:"center",
          justifyContent:"center", padding:16, zIndex:50, background:"rgba(9,24,48,0.55)" }}
          onClick={() => setShowAdd(false)}>
          <div style={{ background:"#fff", borderRadius:6, width:"100%", maxWidth:440,
            padding:20, display:"flex", flexDirection:"column", gap:12,
            borderTop:`4px solid ${C.gold}` }}
            onClick={e => e.stopPropagation()}>
            <h2 style={{ fontWeight:700, textTransform:"uppercase",
              letterSpacing:"0.08em", fontSize:13, color:C.navy }}>
              Recrutement d'un nouveau membre</h2>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              <label style={{ display:"flex", flexDirection:"column", gap:4,
                fontSize:11, fontWeight:600, color:C.grey }}>
                Matricule (E-00) *
                <input style={inputStyle} value={form.matricule} placeholder="E-00"
                  onChange={e => setForm({ ...form, matricule: e.target.value })} />
              </label>
              <label style={{ display:"flex", flexDirection:"column", gap:4,
                fontSize:11, fontWeight:600, color:C.grey }}>
                Grade
                <select style={inputStyle} value={form.grade}
                  onChange={e => setForm({ ...form, grade: e.target.value })}>
                  {GRADES.map(g => <option key={g}>{g}</option>)}
                </select>
              </label>
              {PERSO_FIELDS.map(([k,label]) => (
                <label key={k} style={{ display:"flex", flexDirection:"column", gap:4,
                  fontSize:11, fontWeight:600, color:C.grey }}>
                  {label}
                  <input style={inputStyle} value={form[k]}
                    onChange={e => setForm({ ...form, [k]: e.target.value })} />
                </label>
              ))}
            </div>
            {formError && <p style={{ fontSize:11, fontWeight:600, color:C.red }}>{formError}</p>}
            <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginTop:4 }}>
              <button onClick={() => setShowAdd(false)}
                style={{ padding:"6px 16px", fontSize:13, borderRadius:2,
                  border:`1px solid ${C.line}`, background:"#fff", color:C.grey }}>Annuler</button>
              <button onClick={addMember}
                style={{ padding:"6px 16px", fontSize:13, borderRadius:2, fontWeight:600,
                  color:"#fff", background:C.green }}>Recruter</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
