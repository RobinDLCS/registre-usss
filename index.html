// Toujours convertir un matricule en format strict E-NN ("e16", "E 16", "E-016" → "E-16")
function normaliseMat(s) {
  if (!s) return "";
  const clean = String(s).trim().toUpperCase().replace(/\s+/g, "");
  const m = clean.match(/^E-?(\d{1,3})$/);
  if (!m) return clean;
  return "E-" + String(parseInt(m[1], 10)).padStart(2, "0");
}

// ─── Helpers pointeuse (services pouvant traverser minuit) ───
function dureeMinutes(hd, hf) {
  if (!hd || !hf) return 0;
  const [h1, m1] = hd.split(":").map(Number);
  const [h2, m2] = hf.split(":").map(Number);
  let d = (h2 * 60 + m2) - (h1 * 60 + m1);
  if (d <= 0) d += 24 * 60; // passe minuit
  return d;
}
function formatDuree(min) {
  const h = Math.floor(min / 60), m = min % 60;
  if (h === 0) return `${m} min`;
  if (m === 0) return `${h}h`;
  return `${h}h${String(m).padStart(2, "0")}`;
}
function formatDateFR(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function dateFinService(dateDebut, hd, hf) {
  if (!dateDebut) return "";
  if (hf > hd) return dateDebut;
  const d = new Date(dateDebut + "T12:00:00"); // midi évite les soucis de DST
  d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10);
}
function lundiDeLaSemaine(isoDate) {
  if (!isoDate) return "";
  const d = new Date(isoDate + "T12:00:00");
  const jour = d.getDay(); // 0=dim, 1=lun, ..., 6=sam
  const decalage = jour === 0 ? -6 : 1 - jour;
  d.setDate(d.getDate() + decalage);
  return d.toISOString().slice(0, 10);
}
function decaleSemaine(lundiISO, nbSemaines) {
  const d = new Date(lundiISO + "T12:00:00");
  d.setDate(d.getDate() + 7 * nbSemaines);
  return d.toISOString().slice(0, 10);
}
function dimancheISO(lundiISO) {
  const d = new Date(lundiISO + "T12:00:00");
  d.setDate(d.getDate() + 6);
  return d.toISOString().slice(0, 10);
}

// ─── API Apps Script ───
async function apiLoad() {
  const res = await fetch(API_URL);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}
async function apiLogin(login, password) {
  const res = await fetch(API_URL, { method: "POST",
    body: JSON.stringify({ action: "login", login, password }) });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}
async function apiSave(session, members, logs) {
  const res = await fetch(API_URL, { method: "POST",
    body: JSON.stringify({ action: "save", session, members, logs }) });
  const data = await res.json();

// ─── Carte tactique interactive (dessin vectoriel synchronisé) ───
// Outils : pinceau, gomme, ligne, flèche, rectangle, cercle + couleur & épaisseur.
// Les traits sont des vecteurs synchronisés via le backend (visibles par tous).
// Zoom : Ctrl + molette. Effacement global : superviseur uniquement.
// Repère visuel du rayon effectif (pinceau/gomme) qui suit le curseur.
function CarteInteractive({ role, identifiant, token }) {
  const V = 1092;                 // espace virtuel (taille native de la carte)
  const wrapRef = useRef(null);
  const mapCv = useRef(null);     // calque carte satellite
  const baseCv = useRef(null);    // calque traits validés
  const liveCv = useRef(null);    // calque aperçu + curseur
  const mapImg = useRef(null);    // objet Image de la carte
  const view = useRef({ scale: 1, ox: 0, oy: 0 }); // transform écran
  const drawing = useRef(false);
  const curPts = useRef([]);      // points du trait libre en cours (coords virtuelles)
  const start = useRef({ x: 0, y: 0 });
  const cursor = useRef({ x: -999, y: -999, on: false });
  const strokesRef = useRef([]);  // traits validés (source : serveur)
  const versionRef = useRef(0);
  const sizeRef = useRef(900);

  const [outil, setOutil] = useState("pinceau");
  const [couleur, setCouleur] = useState("#E11D48");
  const [epaisseur, setEpaisseur] = useState(6);
  const [side, setSide] = useState(900);
  const [sync, setSync] = useState("…");        // état de synchro affiché
  const [showSize, setShowSize] = useState(false); // aperçu de taille centré
  const epaisseurRef = useRef(6);
  const outilRef = useRef("pinceau");
  const couleurRef = useRef("#E11D48");
  useEffect(() => { epaisseurRef.current = epaisseur; }, [epaisseur]);
  useEffect(() => { outilRef.current = outil; }, [outil]);
  useEffect(() => { couleurRef.current = couleur; }, [couleur]);

  const OUTILS = [
    ["pinceau", "Pinceau", "🖌"],
    ["ligne",   "Ligne",   "／"],
    ["fleche",  "Flèche",  "➤"],
    ["rect",    "Rectangle", "▭"],
    ["cercle",  "Cercle",  "◯"],
    ["gomme",   "Gomme",   "🧽"],
  ];
  const PALETTE = ["#E11D48","#F59E0B","#FACC15","#22C55E","#0EA5E9","#1D4E89","#7C3AED","#111827","#FFFFFF"];
  const estForme = (t) => t === "ligne" || t === "fleche" || t === "rect" || t === "cercle";
  const largeurEffective = (t, w) => (t === "gomme" ? w * 3 : w);

  // Dimensionne la zone (carrée) et initialise la vue ajustée.
  useEffect(() => {
    function resize() {
      const w = wrapRef.current ? wrapRef.current.clientWidth : 900;
      const s = Math.max(280, Math.min(w, 1000));
      sizeRef.current = s;
      setSide(s);
      view.current = { scale: s / V, ox: 0, oy: 0 };
      redrawMap();
      redrawBase();
    }
    resize();
    window.addEventListener("resize", resize);
    return () => window.removeEventListener("resize", resize);
  }, []);

  // Charge l'image de la carte (depuis l'URL distante).
  useEffect(() => {
    const img = new Image();
    // NB : pas de crossOrigin → la carte s'affiche même sans en-tête CORS.
    // L'export PNG bascule sur les annotations seules si le canvas est protégé.
    img.onload = () => { mapImg.current = img; redrawMap(); };
    img.onerror = () => { mapImg.current = null; redrawMap(); };
    img.src = MAP_URL;
  }, []);

  // Synchronisation périodique avec le serveur.
  useEffect(() => {
    let alive = true;
    async function tick() {
      try {
        const data = await apiLoadCarte(versionRef.current);
        if (!alive) return;
        if (!data.same && Array.isArray(data.strokes)) {
          strokesRef.current = data.strokes;
          versionRef.current = data.v;
          redrawBase();
        } else if (data.v != null) {
          versionRef.current = data.v;
        }
        setSync("✓ synchronisé");
      } catch (e) {
        if (alive) setSync("⚠ hors-ligne");
      }
    }
    tick();
    const iv = setInterval(tick, CARTE_POLL_MS);
    return () => { alive = false; clearInterval(iv); };
  }, []);

  function redrawMap() {
    const cv = mapCv.current; if (!cv) return;
    const ctx = cv.getContext("2d");
    const { scale, ox, oy } = view.current;
    ctx.clearRect(0, 0, cv.width, cv.height);
    ctx.fillStyle = "#0b1722";
    ctx.fillRect(0, 0, cv.width, cv.height);
    if (mapImg.current) {
      ctx.drawImage(mapImg.current, ox, oy, V * scale, V * scale);
    }
  }

  function traceStroke(ctx, st) {
    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = largeurEffective(st.t, st.w);
    ctx.strokeStyle = st.c;
    ctx.fillStyle = st.c;
    if (st.t === "gomme") ctx.globalCompositeOperation = "destination-out";
    const p = st.p;
    ctx.beginPath();
    if (st.t === "pinceau" || st.t === "gomme") {
      if (p.length >= 2) {
        ctx.moveTo(p[0], p[1]);
        for (let i = 2; i < p.length; i += 2) ctx.lineTo(p[i], p[i+1]);
        if (p.length === 2) ctx.lineTo(p[0] + 0.01, p[1] + 0.01);
        ctx.stroke();
      }
    } else if (st.t === "ligne") {
      ctx.moveTo(p[0], p[1]); ctx.lineTo(p[2], p[3]); ctx.stroke();
    } else if (st.t === "rect") {
      ctx.strokeRect(Math.min(p[0],p[2]), Math.min(p[1],p[3]),
        Math.abs(p[2]-p[0]), Math.abs(p[3]-p[1]));
    } else if (st.t === "cercle") {
      const r = Math.hypot(p[2]-p[0], p[3]-p[1]);
      ctx.arc(p[0], p[1], r, 0, Math.PI*2); ctx.stroke();
    } else if (st.t === "fleche") {
      ctx.moveTo(p[0], p[1]); ctx.lineTo(p[2], p[3]); ctx.stroke();
      const ang = Math.atan2(p[3]-p[1], p[2]-p[0]);
      const h = Math.max(14, st.w*3);
      ctx.beginPath();
      ctx.moveTo(p[2], p[3]);
      ctx.lineTo(p[2] - h*Math.cos(ang - Math.PI/7), p[3] - h*Math.sin(ang - Math.PI/7));
      ctx.lineTo(p[2] - h*Math.cos(ang + Math.PI/7), p[3] - h*Math.sin(ang + Math.PI/7));
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  function redrawBase() {
    const cv = baseCv.current; if (!cv) return;
    const ctx = cv.getContext("2d");
    const { scale, ox, oy } = view.current;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, cv.width, cv.height);
    ctx.setTransform(scale, 0, 0, scale, ox, oy);
    for (const st of strokesRef.current) traceStroke(ctx, st);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  // Aperçu (forme en cours + repère de taille du pinceau/gomme).
  function redrawLive(previewStroke) {
    const cv = liveCv.current; if (!cv) return;
    const ctx = cv.getContext("2d");
    const { scale, ox, oy } = view.current;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, cv.width, cv.height);
    if (previewStroke) {
      ctx.setTransform(scale, 0, 0, scale, ox, oy);
      traceStroke(ctx, previewStroke);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
    }
    // Repère de rayon (cercle) pour pinceau & gomme
    const c = cursor.current;
    const t = outilRef.current;
    if ((t === "pinceau" || t === "gomme") && (c.on || showSize)) {
      const diam = largeurEffective(t, epaisseurRef.current) * scale;
      const r = Math.max(2, diam / 2);
      let cx = c.x, cy = c.y;
      if (!c.on && showSize) { cx = cv.width / 2; cy = cv.height / 2; }
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.strokeStyle = t === "gomme" ? "#ffffff" : couleurRef.current;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    }
  }

  // ── conversions écran ↔ virtuel ──
  function screenPos(e) {
    const r = liveCv.current.getBoundingClientRect();
    const t = e.touches && e.touches[0] ? e.touches[0]
            : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0] : e);
    const sx = liveCv.current.width / r.width;
    const sy = liveCv.current.height / r.height;
    return { x: (t.clientX - r.left) * sx, y: (t.clientY - r.top) * sy };
  }
  function toVirtual(sp) {
    const { scale, ox, oy } = view.current;
    return { x: (sp.x - ox) / scale, y: (sp.y - oy) / scale };
  }

  function down(e) {
    e.preventDefault();
    drawing.current = true;
    const v = toVirtual(screenPos(e));
    start.current = v;
    curPts.current = [v.x, v.y];
    cursor.current = { ...screenPos(e), on: true };
  }

  function move(e) {
    const sp = screenPos(e);
    cursor.current = { x: sp.x, y: sp.y, on: true };
    if (!drawing.current) { redrawLive(null); return; }
    e.preventDefault();
    const v = toVirtual(sp);
    const t = outilRef.current;
    if (t === "pinceau" || t === "gomme") {
      const pts = curPts.current;
      const lx = pts[pts.length - 2], ly = pts[pts.length - 1];
      if (Math.hypot(v.x - lx, v.y - ly) > 1.5) pts.push(v.x, v.y);
      redrawLive({ t, c: couleurRef.current, w: epaisseurRef.current, p: pts });
    } else {
      redrawLive({ t, c: couleurRef.current, w: epaisseurRef.current,
        p: [start.current.x, start.current.y, v.x, v.y] });
    }
  }

  async function up(e) {
    if (!drawing.current) return;
    drawing.current = false;
    const t = outilRef.current;
    let p;
    if (t === "pinceau" || t === "gomme") {
      p = curPts.current.slice();
      if (p.length > 800) { // sous-échantillonnage de sécurité
        const step = Math.ceil(p.length / 800);
        const reduced = [];
        for (let i = 0; i < p.length; i += 2 * step) reduced.push(p[i], p[i+1]);
        p = reduced;
      }
    } else {
      const v = toVirtual(screenPos(e));
      p = [start.current.x, start.current.y, v.x, v.y];
    }
    curPts.current = [];
    const st = {
      id: Date.now() + "-" + Math.random().toString(36).slice(2, 6),
      t, c: couleurRef.current, w: epaisseurRef.current,
      p: p.map(n => Math.round(n)), au: identifiant || role,
    };
    // Affichage immédiat (optimiste)
    strokesRef.current = strokesRef.current.concat([st]);
    redrawBase();
    redrawLive(null);
    if (!token) { setSync("⚠ non connecté"); return; }
    try {
      const r = await apiAddCarteTrait(token, st);
      if (r && r.v != null) versionRef.current = r.v;
      setSync("✓ synchronisé");
    } catch (err) {
      setSync("⚠ échec d'envoi");
    }
  }

  function leave() {
    cursor.current = { x: -999, y: -999, on: false };
    if (!drawing.current) redrawLive(null);
  }

  // Zoom Ctrl + molette (centré sur le curseur).
  function wheel(e) {
    if (!e.ctrlKey) return;          // sans Ctrl : on laisse défiler la page
    e.preventDefault();
    const sp = screenPos(e);
    const vw = view.current;
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    const minScale = sizeRef.current / V;       // 1x = carte ajustée au cadre
    const maxScale = minScale * 8;
    const ns = Math.min(maxScale, Math.max(minScale, vw.scale * factor));
    // garde le point virtuel sous le curseur immobile
    const vx = (sp.x - vw.ox) / vw.scale;
    const vy = (sp.y - vw.oy) / vw.scale;
    vw.ox = sp.x - vx * ns;
    vw.oy = sp.y - vy * ns;
    vw.scale = ns;
    // clamp pour ne pas sortir la carte du cadre
    const span = V * ns;
    const s = sizeRef.current;
    vw.ox = Math.min(0, Math.max(s - span, vw.ox));
    vw.oy = Math.min(0, Math.max(s - span, vw.oy));
    redrawMap(); redrawBase(); redrawLive(null);
  }

  function resetZoom() {
    view.current = { scale: sizeRef.current / V, ox: 0, oy: 0 };
    redrawMap(); redrawBase(); redrawLive(null);
  }

  // Repère de taille temporaire au changement d'épaisseur.
  function changeEpaisseur(val) {
    setEpaisseur(val);
    epaisseurRef.current = val;
    setShowSize(true);
    redrawLive(null);
    clearTimeout(changeEpaisseur._t);
    changeEpaisseur._t = setTimeout(() => { setShowSize(false); redrawLive(null); }, 1100);
  }
  useEffect(() => { redrawLive(null); }, [showSize, outil, couleur, epaisseur]);
  // Après redimensionnement (canvas recréés/vidés), on réajuste et on redessine.
  useEffect(() => {
    view.current = { scale: side / V, ox: 0, oy: 0 };
    redrawMap(); redrawBase(); redrawLive(null);
  }, [side]);

  async function effacerTout() {
    if (role !== "superviseur") return;
    if (!window.confirm("Effacer la carte pour TOUS les utilisateurs ?")) return;
    try {
      const r = await apiClearCarte(token);
      strokesRef.current = [];
      if (r && r.v != null) versionRef.current = r.v;
      redrawBase();
      setSync("✓ carte effacée");
    } catch (e) { setSync("⚠ échec effacement"); }
  }

  function telecharger() {
    const s = sizeRef.current;
    const out = document.createElement("canvas");
    out.width = s; out.height = s;
    const octx = out.getContext("2d");
    octx.fillStyle = "#0b1722"; octx.fillRect(0, 0, s, s);
    const { scale, ox, oy } = view.current;
    try {
      if (mapImg.current) octx.drawImage(mapImg.current, ox, oy, V*scale, V*scale);
      octx.drawImage(baseCv.current, 0, 0);
    } catch (err) {
      // image distante non exportable (CORS) : on exporte les seules annotations
      octx.clearRect(0, 0, s, s);
      octx.drawImage(baseCv.current, 0, 0);
    }
    let url;
    try { url = out.toDataURL("image/png"); }
    catch (err) {
      const only = document.createElement("canvas");
      only.width = s; only.height = s;
      only.getContext("2d").drawImage(baseCv.current, 0, 0);
      url = only.toDataURL("image/png");
    }
    const link = document.createElement("a");
    link.download = "carte-tactique-" + Date.now() + ".png";
    link.href = url; link.click();
  }

  const btnOutil = (actif) => ({
    padding:"7px 12px", fontSize:12, fontWeight:600, borderRadius:4,
    border:`1px solid ${actif ? C.navy : C.line}`,
    background: actif ? C.navy : "#fff", color: actif ? "#fff" : C.ink,
    display:"flex", alignItems:"center", gap:6,
  });

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
        flexWrap:"wrap", gap:12 }}>
        <h2 style={{ fontSize:13, fontWeight:700, textTransform:"uppercase",
          letterSpacing:"0.08em", color:C.navy }}>Carte tactique interactive</h2>
        <span style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:11, color:C.grey }}>
            {role === "superviseur" ? "✎ Superviseur" : "👮 Agent"}
            {identifiant ? " · " + identifiant : ""}
          </span>
          <span style={{ fontSize:11, fontWeight:600, padding:"2px 8px", borderRadius:99,
            background: sync.indexOf("⚠") === 0 ? "#FBEAEA" : C.blueSoft,
            color: sync.indexOf("⚠") === 0 ? C.red : C.blue }}>{sync}</span>
        </span>
      </div>

      <div style={{ background:"#fff", border:`1px solid ${C.line}`, borderRadius:6,
        padding:12, display:"flex", flexWrap:"wrap", alignItems:"center", gap:14 }}>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          {OUTILS.map(([id, label, ico]) => (
            <button key={id} onClick={() => setOutil(id)} style={btnOutil(outil === id)}>
              <span style={{ fontSize:14 }}>{ico}</span>{label}
            </button>
          ))}
        </div>

        <div style={{ width:1, height:28, background:C.line }} />

        <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
          {PALETTE.map(c => (
            <button key={c} onClick={() => setCouleur(c)} title={c}
              style={{ width:24, height:24, borderRadius:"50%", background:c,
                border: couleur === c ? `3px solid ${C.navy}` : `1px solid ${C.line}`,
                boxShadow: c === "#FFFFFF" ? "inset 0 0 0 1px "+C.line : "none" }} />
          ))}
          <input type="color" value={couleur} onChange={e => setCouleur(e.target.value)}
            title="Couleur personnalisée"
            style={{ width:30, height:26, padding:0, border:`1px solid ${C.line}`,
              borderRadius:4, background:"#fff", cursor:"pointer" }} />
        </div>

        <div style={{ width:1, height:28, background:C.line }} />

        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:11, color:C.grey, textTransform:"uppercase",
            letterSpacing:"0.06em" }}>Épaisseur</span>
          <input type="range" min={1} max={48} value={epaisseur}
            onChange={e => changeEpaisseur(Number(e.target.value))} style={{ width:120 }} />
          <span style={{ fontSize:12, fontWeight:600, color:C.navy, width:26,
            textAlign:"right" }}>{epaisseur}</span>
        </div>

        <div style={{ flex:1 }} />

        <button onClick={resetZoom}
          style={{ padding:"7px 12px", fontSize:12, fontWeight:600, borderRadius:4,
            background:"#fff", color:C.navy, border:`1px solid ${C.line}` }}>⤢ Zoom 1:1</button>
        <button onClick={telecharger}
          style={{ padding:"7px 14px", fontSize:12, fontWeight:600, borderRadius:4,
            background:C.blue, color:"#fff" }}>⤓ PNG</button>
        {role === "superviseur" && (
          <button onClick={effacerTout}
            style={{ padding:"7px 14px", fontSize:12, fontWeight:600, borderRadius:4,
              background:"#fff", color:C.red, border:`1px solid ${C.red}` }}>Tout effacer</button>
        )}
      </div>

      <div ref={wrapRef} style={{ width:"100%", display:"flex", justifyContent:"center" }}>
        <div style={{ position:"relative", width:side, height:side,
          border:`1px solid ${C.line}`, borderRadius:6, overflow:"hidden",
          boxShadow:"0 1px 6px rgba(14,34,64,0.12)", background:"#0b1722",
          touchAction:"none" }}>
          <canvas ref={mapCv} width={side} height={side}
            style={{ position:"absolute", inset:0, width:"100%", height:"100%" }} />
          <canvas ref={baseCv} width={side} height={side}
            style={{ position:"absolute", inset:0, width:"100%", height:"100%" }} />
          <canvas ref={liveCv} width={side} height={side}
            style={{ position:"absolute", inset:0, width:"100%", height:"100%",
              cursor: (outil === "pinceau" || outil === "gomme") ? "none" : "crosshair" }}
            onMouseDown={down} onMouseMove={move} onMouseUp={up} onMouseLeave={leave}
            onTouchStart={down} onTouchMove={move} onTouchEnd={up}
            onWheel={wheel} />
        </div>
      </div>

      <p style={{ fontSize:11, color:C.grey, lineHeight:1.5 }}>
        Annotations partagées en temps quasi réel entre tous les utilisateurs connectés
        (rafraîchissement toutes les {Math.round(CARTE_POLL_MS/1000)} s).
        <strong> Ctrl + molette</strong> pour zoomer, <strong>⤢ Zoom 1:1</strong> pour réinitialiser.
        {role === "superviseur"
          ? " En tant que superviseur, « Tout effacer » réinitialise la carte pour tout le monde."
          : " Seul un superviseur peut effacer l'ensemble de la carte."}
      </p>
    </div>
  );
}

// ─── Application ───
function App() {
  const [members, setMembers] = useState(null);
  const [logs, setLogs] = useState([]);
  const [loadError, setLoadError] = useState("");
  const [saveState, setSaveState] = useState("ok"); // ok | saving | error
  const [page, setPage] = useState("accueil");
  const [vue, setVue] = useState("formations");
  const [showAdd, setShowAdd] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [form, setForm] = useState({ matricule:"", grade:"Field Agent",
    nom:"", prenom:"", dateEntree:"", iban:"", telephone:"" });
  const [formError, setFormError] = useState("");

  // Authentification éditeur
  const [session, setSession] = useState(null); // { token, login }
  const [showLogin, setShowLogin] = useState(false);
  const [loginForm, setLoginForm] = useState({ login:"", password:"" });
  const [loginError, setLoginError] = useState("");
  const [loginBusy, setLoginBusy] = useState(false);

  // Authentification agent (pointeuse)
  const [agentSession, setAgentSession] = useState(null); // { token, matricule }
  const [showAgentLogin, setShowAgentLogin] = useState(false);
  const [agentLoginForm, setAgentLoginForm] = useState({ matricule:"", password:"" });
  const [agentLoginError, setAgentLoginError] = useState("");
  const [agentLoginBusy, setAgentLoginBusy] = useState(false);

  // Pointeuse
  const todayISO = new Date().toISOString().slice(0, 10);
  const [pointages, setPointages] = useState([]);
  const [pointageForm, setPointageForm] = useState({
    date: todayISO, heureDebut: "", heureFin: "", missions: "", resume: "",
  });
  const [pointageError, setPointageError] = useState("");
  const [pointageBusy, setPointageBusy] = useState(false);
  const [filtreMat, setFiltreMat] = useState("");
  const [lundiSelect, setLundiSelect] = useState(lundiDeLaSemaine(todayISO));

  // Rapports
  const [rapports, setRapports] = useState([]);
  const [rapportEdit, setRapportEdit] = useState(null);   // objet rapport en édition (ou null)
  const [rapportView, setRapportView] = useState(null);   // objet rapport en visualisation (ou null)
  const [rapportBusy, setRapportBusy] = useState(false);
  const [rapportError, setRapportError] = useState("");
  const [confirmSubmit, setConfirmSubmit] = useState(false);
  const [confirmDeleteRap, setConfirmDeleteRap] = useState(null);
  const [filtreRedacteur, setFiltreRedacteur] = useState("");

  // Fiche agent + rapport d'incident
  const [ficheMat, setFicheMat] = useState(null);
  const [rapportTexte, setRapportTexte] = useState("");

  const editor = session !== null;
  const agentLogged = agentSession !== null;
  // Un agent simple peut naviguer entre Pointeuse et Rapports ; toute autre page est redirigée.
  const PAGES_AGENT = ["pointeuse", "rapports", "carte"];
  const pageEffective = (agentLogged && !editor)
    ? (PAGES_AGENT.includes(page) ? page : "pointeuse")
    : page;

  // Chargement initial + sessions mémorisées
  useEffect(() => {
    try {
      const saved = sessionStorage.getItem("usss-session");
      if (saved) setSession(JSON.parse(saved));
    } catch (e) {}
    try {
      const savedA = sessionStorage.getItem("usss-agent");
      if (savedA) setAgentSession(JSON.parse(savedA));
    } catch (e) {}
    (async () => {
      try {
        const data = await apiLoad();
        setMembers(data.members || SEED);
        setLogs(data.logs || []);
        setPointages(data.pointages || []);
        setRapports(data.rapports || []);
      } catch (e) {
        setLoadError("Connexion au registre impossible : " + e.message +
          " — vérifie API_URL et le déploiement Apps Script.");
      }
    })();
  }, []);

  const doLogin = async () => {
    setLoginBusy(true); setLoginError("");
    try {
      const data = await apiLogin(loginForm.login, loginForm.password);
      const s = { token: data.token, login: data.login };
      setSession(s);
      try { sessionStorage.setItem("usss-session", JSON.stringify(s)); } catch (e) {}
      setShowLogin(false);
      setLoginForm({ login:"", password:"" });
    } catch (e) {
      setLoginError(e.message);
    }
    setLoginBusy(false);
  };

  const doLogout = () => {
    setSession(null);
    try { sessionStorage.removeItem("usss-session"); } catch (e) {}
  };

  const doLoginAgent = async () => {
    setAgentLoginBusy(true); setAgentLoginError("");
    try {
      const data = await apiLoginAgent(agentLoginForm.matricule, agentLoginForm.password);
      const s = { token: data.token, matricule: data.matricule };
      setAgentSession(s);
      try { sessionStorage.setItem("usss-agent", JSON.stringify(s)); } catch (e) {}
      setShowAgentLogin(false);
      setAgentLoginForm({ matricule:"", password:"" });
    } catch (e) {
      setAgentLoginError(e.message);
    }
    setAgentLoginBusy(false);
  };

  const doLogoutAgent = () => {
    setAgentSession(null);
    try { sessionStorage.removeItem("usss-agent"); } catch (e) {}
  };

  // Ajout d'un pointage par l'agent connecté
  const submitPointage = async () => {
    setPointageError("");
    if (!agentLogged) { setPointageError("Connecte-toi en tant qu'agent pour pointer."); return; }
    const f = pointageForm;
    if (!f.date)       { setPointageError("Date requise."); return; }
    if (!f.heureDebut) { setPointageError("Heure de prise de service requise."); return; }
    if (!f.heureFin)   { setPointageError("Heure de fin de service requise."); return; }
    if (f.heureDebut === f.heureFin) {
      setPointageError("L'heure de début et de fin sont identiques — durée nulle.");
      return;
    }
    if (!f.missions.trim()) { setPointageError("Décris au moins une mission effectuée."); return; }

    const p = {
      id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
      matricule: agentSession.matricule,
      date: f.date,
      heureDebut: f.heureDebut,
      heureFin: f.heureFin,
      missions: f.missions.trim(),
      resume: f.resume.trim(),
      createdAt: new Date().toLocaleString("fr-FR"),
    };
    setPointageBusy(true);
    try {
      await apiAddPointage(agentSession.token, p);
      setPointages([p, ...pointages]);
      setPointageForm({ date: todayISO, heureDebut:"", heureFin:"", missions:"", resume:"" });
    } catch (e) {
      setPointageError(e.message);
      if (String(e.message).includes("Session")) doLogoutAgent();
    }
    setPointageBusy(false);
  };

  const removePointage = async (pid) => {
    const token = agentSession ? agentSession.token : (session ? session.token : null);
    if (!token) return;
    try {
      await apiDeletePointage(token, pid);
      setPointages(pointages.filter(p => p.id !== pid));
    } catch (e) {
      alert("Suppression impossible : " + e.message);
    }
  };

  // ─── Rapports ───
  const nouveauRapport = () => {
    if (!agentLogged && !editor) return;
    const mat = agentLogged ? agentSession.matricule : "";
    const me = members.find(m => normaliseMat(m.matricule) === normaliseMat(mat));
    const r = {
      id: Date.now() + "-" + Math.random().toString(36).slice(2, 8),
      numero: "",
      redacteurMat: mat,
      redacteurGrade: me ? me.grade : "",
      cibleAgentMat: "",
      cibleAgentGrade: "",
      cibleCitoyenPrenom: "",
      cibleCitoyenNom: "",
      localisation: "",
      dateHeureFait: "",
      contexte: "",
      faitsReproches: "",
      autresIncidents: "",
      etat: "brouillon",
      dateCreation: new Date().toLocaleString("fr-FR"),
      dateSoumission: "",
    };
    setRapportEdit(r);
    setRapportError("");
  };

  const saveBrouillon = async () => {
    if (!rapportEdit) return;
    const token = agentLogged ? agentSession.token : (session ? session.token : null);
    if (!token) return;
    setRapportBusy(true); setRapportError("");
    try {
      await apiSaveRapport(token, rapportEdit);
      // Mise à jour locale : si existait, remplace ; sinon ajoute en tête
      setRapports(prev => {
        const idx = prev.findIndex(x => x.id === rapportEdit.id);
        if (idx >= 0) { const copy = [...prev]; copy[idx] = rapportEdit; return copy; }
        return [rapportEdit, ...prev];
      });
      setRapportEdit(null);
    } catch (e) {
      setRapportError(e.message);
    }
    setRapportBusy(false);
  };

  const soumettreRapport = async () => {
    if (!rapportEdit) return;
    // Validation : au moins le contexte OU les faits doivent être renseignés
    if (!rapportEdit.contexte.trim() && !rapportEdit.faitsReproches.trim()) {
      setRapportError("Au moins le contexte ou les faits reprochés doivent être renseignés avant soumission.");
      return;
    }
    const token = agentLogged ? agentSession.token : (session ? session.token : null);
    if (!token) return;
    setRapportBusy(true); setRapportError("");
    try {
      // D'abord sauvegarder le brouillon, puis soumettre
      await apiSaveRapport(token, rapportEdit);
      const res = await apiSubmitRapport(token, rapportEdit.id);
      const soumis = { ...rapportEdit, etat: "soumis",
        numero: res.numero, dateSoumission: res.dateSoumission };
      setRapports(prev => {
        const idx = prev.findIndex(x => x.id === soumis.id);
        if (idx >= 0) { const copy = [...prev]; copy[idx] = soumis; return copy; }
        return [soumis, ...prev];
      });
      setRapportEdit(null);
      setConfirmSubmit(false);
      setRapportView(soumis); // ouvre directement la vue de lecture
    } catch (e) {
      setRapportError(e.message);
    }
    setRapportBusy(false);
  };

  const supprimerRapport = async (id) => {
    const token = agentLogged ? agentSession.token : (session ? session.token : null);
    if (!token) return;
    try {
      await apiDeleteRapport(token, id);
      setRapports(prev => prev.filter(r => r.id !== id));
      setConfirmDeleteRap(null);
      if (rapportView && rapportView.id === id) setRapportView(null);
    } catch (e) {
      alert("Suppression impossible : " + e.message);
    }
  };

  // ─── Export PNG/PDF ───
  const exportRapport = async (format) => {
    const el = document.getElementById("rapport-printable");
    if (!el || !window.html2canvas) return;
    try {
      // Garantir que Montserrat et le logo sont chargés avant capture
      if (document.fonts && document.fonts.ready) await document.fonts.ready;
      const captured = await window.html2canvas(el, {
        scale: 2, backgroundColor: "#ffffff", logging: false, useCORS: true,
      });
      // Aplatir sur un fond blanc 100% opaque (certains rendus laissent
      // des pixels transparents qui s'affichent en noir selon les viewers)
      const canvas = document.createElement("canvas");
      canvas.width = captured.width;
      canvas.height = captured.height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(captured, 0, 0);
      const nomFichier = (rapportView && rapportView.numero ? rapportView.numero
        : "rapport-" + (rapportView ? rapportView.id.slice(0, 6) : "x"));
      if (format === "png") {
        const link = document.createElement("a");
        link.download = nomFichier + ".png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      } else {
        // PDF A4 multipage si nécessaire
        const { jsPDF } = window.jspdf;
        const imgData = canvas.toDataURL("image/png");
        const pdf = new jsPDF("p", "mm", "a4");
        const pdfW = 210, pdfH = 297;
        const imgH = canvas.height * pdfW / canvas.width;
        if (imgH <= pdfH) {
          pdf.addImage(imgData, "PNG", 0, 0, pdfW, imgH);
        } else {
          let heightLeft = imgH;
          let position = 0;
          pdf.addImage(imgData, "PNG", 0, position, pdfW, imgH);
          heightLeft -= pdfH;
          while (heightLeft > 0) {
            position -= pdfH;
            pdf.addPage();
            pdf.addImage(imgData, "PNG", 0, position, pdfW, imgH);
            heightLeft -= pdfH;
          }
        }
        pdf.save(nomFichier + ".pdf");
      }
    } catch (e) {
      alert("Export impossible : " + e.message);
    }
  };

  // Sauvegarde + journalisation (snapshot = état AVANT la modification)
  const persist = async (list, action) => {
    if (!editor) return;
    let newLogs = logs;
    if (action && members) {
      const entry = {
        id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
        date: new Date().toLocaleString("fr-FR"),
        action,
        auteur: session.login,
        snapshot: members,
      };
      newLogs = [entry, ...logs].slice(0, MAX_LOGS);
      setLogs(newLogs);
    }
    setMembers(list);
    setSaveState("saving");
    try {
      await apiSave(session.token, list, newLogs);
      setSaveState("ok");
    } catch (e) {
      console.error(e);
      setSaveState("error");
      if (String(e.message).includes("Session")) {
        doLogout();
        setShowLogin(true);
        setLoginError("Ta session a expiré — reconnecte-toi puis refais la dernière action.");
      }
    }
  };

  const restoreFrom = (entry) =>
    persist(entry.snapshot, `↩ Retour arrière : état restauré avant « ${entry.action} »`);

  if (loadError) {
    return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center",
      justifyContent:"center", background:C.paper, padding:24 }}>
      <div style={{ maxWidth:480, background:"#FBEDED", border:"1px solid #E5C5C5",
        color:C.red, borderRadius:6, padding:20, fontSize:14 }}>{loadError}</div>
    </div>;
  }

  if (members === null) {
    return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center",
      justifyContent:"center", background:C.paper, color:C.grey }}>
      Chargement du registre…
    </div>;
  }

  // ── Écran de choix d'accès si personne n'est connecté ──
  if (!editor && !agentLogged) {
    return <div style={{ minHeight:"100vh", background:C.paper,
      display:"flex", flexDirection:"column" }}>
      <header style={{ background:C.navy, borderBottom:`3px solid ${C.gold}`, padding:"16px 20px" }}>
        <div style={{ maxWidth:1120, margin:"0 auto", display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ background:"#fff", borderRadius:6, padding:"5px 9px",
            display:"flex", alignItems:"center", border:`1px solid ${C.gold}` }}>
            <img src={LOGO_USSS} alt="United States Secret Service"
              style={{ height:34, width:"auto", display:"block" }} />
          </div>
          <div>
            <div style={{ fontSize:11, letterSpacing:"0.08em", color:"#9FB2CC" }}>
              Registre des effectifs &amp; pointeuse</div>
          </div>
        </div>
      </header>
      <main style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
        <div style={{ background:"#fff", borderRadius:8, padding:"36px 32px",
          maxWidth:560, width:"100%", textAlign:"center",
          border:`1px solid ${C.line}`, borderTop:`4px solid ${C.gold}` }}>
          <div style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.15em",
            color:C.grey, marginBottom:8 }}>Sélectionne ton mode d'accès</div>
          <h1 style={{ fontSize:22, fontWeight:700, color:C.navy, marginBottom:24 }}>
            Authentification requise</h1>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",
            gap:14, marginBottom:20 }}>
            <button onClick={() => { setShowAgentLogin(true); setAgentLoginError(""); }}
              style={{ padding:"22px 14px", borderRadius:4, background:"#fff",
                border:`1px solid ${C.line}`, borderTop:`3px solid ${C.blue}`,
                display:"flex", flexDirection:"column", gap:6, textAlign:"center" }}>
              <div style={{ fontSize:30 }}>👮</div>
              <div style={{ fontWeight:700, color:C.navy, textTransform:"uppercase",
                letterSpacing:"0.08em", fontSize:13 }}>Agent</div>
              <div style={{ fontSize:11, color:C.grey, lineHeight:1.4 }}>
                Pointer un service, consulter mes propres heures</div>
            </button>
            <button onClick={() => { setShowLogin(true); setLoginError(""); }}
              style={{ padding:"22px 14px", borderRadius:4, background:"#fff",
                border:`1px solid ${C.line}`, borderTop:`3px solid ${C.gold}`,
                display:"flex", flexDirection:"column", gap:6, textAlign:"center" }}>
              <div style={{ fontSize:30 }}>🔑</div>
              <div style={{ fontWeight:700, color:C.navy, textTransform:"uppercase",
                letterSpacing:"0.08em", fontSize:13 }}>Supervision</div>
              <div style={{ fontSize:11, color:C.grey, lineHeight:1.4 }}>
                Gestion complète : effectifs, formations, pointages, récap hebdo</div>
            </button>
          </div>
          <p style={{ fontSize:11, color:C.grey }}>
            Contacte l'administration pour obtenir tes identifiants.
          </p>
        </div>
      </main>
      {/* Modales de connexion */}
      {showLogin && (
        <div style={{ position:"fixed", inset:0, display:"flex", alignItems:"center",
          justifyContent:"center", padding:16, zIndex:60, background:"rgba(9,24,48,0.55)" }}
          onClick={() => setShowLogin(false)}>
          <div style={{ background:"#fff", borderRadius:6, width:"100%", maxWidth:340,
            padding:20, display:"flex", flexDirection:"column", gap:12,
            borderTop:`4px solid ${C.gold}` }}
            onClick={e => e.stopPropagation()}>
            <h2 style={{ fontWeight:700, textTransform:"uppercase",
              letterSpacing:"0.08em", fontSize:13, color:C.navy }}>Connexion supervision</h2>
            <label style={{ display:"flex", flexDirection:"column", gap:4,
              fontSize:11, fontWeight:600, color:C.grey }}>
              Identifiant
              <input style={inputStyle} value={loginForm.login} autoFocus
                onChange={e => setLoginForm({ ...loginForm, login: e.target.value })}
                onKeyDown={e => { if (e.key === "Enter") doLogin(); }} />
            </label>
            <label style={{ display:"flex", flexDirection:"column", gap:4,
              fontSize:11, fontWeight:600, color:C.grey }}>
              Mot de passe
              <input style={inputStyle} type="password" value={loginForm.password}
                onChange={e => setLoginForm({ ...loginForm, password: e.target.value })}
                onKeyDown={e => { if (e.key === "Enter") doLogin(); }} />
            </label>
            {loginError && <p style={{ fontSize:11, fontWeight:600, color:C.red }}>{loginError}</p>}
            <div style={{ display:"flex", justifyContent:"flex-end", gap:8 }}>
              <button onClick={() => setShowLogin(false)}
                style={{ padding:"6px 16px", fontSize:13, borderRadius:2,
                  border:`1px solid ${C.line}`, background:"#fff", color:C.grey }}>Annuler</button>
              <button onClick={doLogin} disabled={loginBusy}
                style={{ padding:"6px 16px", fontSize:13, borderRadius:2, fontWeight:600,
                  color:"#fff", background: loginBusy ? "#7A93B5" : C.blue }}>
                {loginBusy ? "Vérification…" : "Se connecter"}</button>
            </div>
          </div>
        </div>
      )}
      {showAgentLogin && (
        <div style={{ position:"fixed", inset:0, display:"flex", alignItems:"center",
          justifyContent:"center", padding:16, zIndex:60, background:"rgba(9,24,48,0.55)" }}
          onClick={() => setShowAgentLogin(false)}>
          <div style={{ background:"#fff", borderRadius:6, width:"100%", maxWidth:340,
            padding:20, display:"flex", flexDirection:"column", gap:12,
            borderTop:`4px solid ${C.gold}` }}
            onClick={e => e.stopPropagation()}>
            <h2 style={{ fontWeight:700, textTransform:"uppercase",
              letterSpacing:"0.08em", fontSize:13, color:C.navy }}>Connexion agent</h2>
            <label style={{ display:"flex", flexDirection:"column", gap:4,
              fontSize:11, fontWeight:600, color:C.grey }}>
              Matricule (E-XX)
              <input style={inputStyle} value={agentLoginForm.matricule} autoFocus
                placeholder="E-00"
                onChange={e => setAgentLoginForm({ ...agentLoginForm, matricule: e.target.value })}
                onKeyDown={e => { if (e.key === "Enter") doLoginAgent(); }} />
            </label>
            <label style={{ display:"flex", flexDirection:"column", gap:4,
              fontSize:11, fontWeight:600, color:C.grey }}>
              Mot de passe
              <input style={inputStyle} type="password" value={agentLoginForm.password}
                onChange={e => setAgentLoginForm({ ...agentLoginForm, password: e.target.value })}
                onKeyDown={e => { if (e.key === "Enter") doLoginAgent(); }} />
            </label>
            {agentLoginError && <p style={{ fontSize:11, fontWeight:600, color:C.red }}>{agentLoginError}</p>}
            <div style={{ display:"flex", justifyContent:"flex-end", gap:8 }}>
              <button onClick={() => setShowAgentLogin(false)}
                style={{ padding:"6px 16px", fontSize:13, borderRadius:2,
                  border:`1px solid ${C.line}`, background:"#fff", color:C.grey }}>Annuler</button>
              <button onClick={doLoginAgent} disabled={agentLoginBusy}
                style={{ padding:"6px 16px", fontSize:13, borderRadius:2, fontWeight:600,
                  color:"#fff", background: agentLoginBusy ? "#7A93B5" : C.blue }}>
                {agentLoginBusy ? "Vérification…" : "Pointer entrée"}</button>
            </div>
          </div>
        </div>
      )}
    </div>;
  }

  const sorted = sortMembers(members);
  const presents = members.filter(m => m.statut === "Présent");
  const absents = members.filter(m => m.statut === "Absent");
  const misAPied = members.filter(m => m.statut === "Mis à pied");
  const fiche = ficheMat ? members.find(m => m.matricule === ficheMat) : null;

  // ── Actions ──
  const toggleBool = (matricule, field) => {
    const m = members.find(x => x.matricule === matricule);
    const newVal = !m[field];
    persist(members.map(x => x.matricule === matricule ? { ...x, [field]: newVal } : x),
      `${matricule} : ${FIELD_LABELS[field]} ${newVal ? "validé" : "retiré"}`);
  };

  const cycleStatut = (matricule) => {
    const m = members.find(x => x.matricule === matricule);
    const next = STATUTS[(STATUTS.indexOf(m.statut) + 1) % STATUTS.length];
    persist(members.map(x => x.matricule === matricule ? { ...x, statut: next } : x),
      `${matricule} : statut → ${next}`);
  };

  const setPerso = (matricule, field, value) =>
    persist(members.map(m => m.matricule === matricule ? { ...m, [field]: value } : m),
      `${matricule} : ${FIELD_LABELS[field]} modifié`);

  const promote = (matricule, dir) => {
    const m = members.find(x => x.matricule === matricule);
    const i = GRADES.indexOf(m.grade) + dir;
    if (i < 0 || i >= GRADES.length) return;
    persist(members.map(x => x.matricule === matricule ? { ...x, grade: GRADES[i] } : x),
      `${matricule} : ${dir < 0 ? "promu" : "rétrogradé"} → ${GRADES[i]}`);
  };

  const removeMember = (matricule) => {
    persist(members.filter(m => m.matricule !== matricule), `${matricule} radié du registre`);
    setConfirmDelete(null);
    if (ficheMat === matricule) setFicheMat(null);
  };

  const addMember = () => {
    const mat = form.matricule.trim().toUpperCase();
    if (!/^E-\d{2}$/.test(mat)) { setFormError("Matricule invalide — format attendu : E-00"); return; }
    if (members.some(m => m.matricule === mat)) { setFormError("Ce matricule existe déjà dans le registre."); return; }
    const nouveau = makeMember(mat, form.grade, []);
    nouveau.nom = form.nom; nouveau.prenom = form.prenom;
    nouveau.dateEntree = form.dateEntree; nouveau.iban = form.iban; nouveau.telephone = form.telephone;
    persist([...members, nouveau], `${mat} recruté (${form.grade})`);
    setShowAdd(false);
    setForm({ matricule:"", grade:"Field Agent", nom:"", prenom:"", dateEntree:"", iban:"", telephone:"" });
    setFormError("");
  };

  const addRapport = () => {
    const texte = rapportTexte.trim();
    if (!texte || !fiche) return;
    const rapport = { id: Date.now() + "-" + Math.random().toString(36).slice(2, 5),
      date: new Date().toLocaleString("fr-FR"), auteur: session.login, texte };
    persist(members.map(m => m.matricule === fiche.matricule
        ? { ...m, rapports: [rapport, ...(m.rapports || [])] } : m),
      `${fiche.matricule} : rapport d'incident rédigé par ${session.login}`);
    setRapportTexte("");
  };

  const deleteRapport = (rapportId) => {
    persist(members.map(m => m.matricule === fiche.matricule
        ? { ...m, rapports: (m.rapports || []).filter(r => r.id !== rapportId) } : m),
      `${fiche.matricule} : rapport d'incident supprimé`);
  };

  const VUES = {
    formations: { label:"Formations", bool:[...BOOL_FIELDS.formations, ...BOOL_FIELDS.qualif, ...BOOL_FIELDS.leading] },
    ppa: { label:"PPA", bool:BOOL_FIELDS.ppa },
    permis: { label:"Permis", bool:BOOL_FIELDS.permis },
    perso: { label:"Infos perso", bool:[] },
    aptitudes: { label:"Aptitudes", bool:[] },
    tout: { label:"Tout", bool:ALL_BOOL },
  };
  const vueActive = VUES[vue];

  const SAVE_BADGE = editor ? {
    ok:     { txt:"✓ Enregistré", bg:"#E3F0E8", fg:C.green },
    saving: { txt:"⟳ Sauvegarde…", bg:C.blueSoft, fg:C.blue },
    error:  { txt:"⚠ Sauvegarde échouée", bg:"#F7E8E8", fg:C.red },
  }[saveState] : { txt:"👁 Lecture seule", bg:"#F6F7F9", fg:C.grey };

  const ficheLogs = fiche ? logs.filter(l => l.action.includes(fiche.matricule)) : [];

  return (
    <div style={{ minHeight:"100vh", background:C.paper, color:C.ink }}>
      {/* ── Bandeau ── */}
      <header style={{ background:C.navy, borderBottom:`3px solid ${C.gold}` }}>
        <div style={{ maxWidth:1120, margin:"0 auto", padding:"16px 20px",
          display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ background:"#fff", borderRadius:6, padding:"5px 9px",
              display:"flex", alignItems:"center", border:`1px solid ${C.gold}` }}>
              <img src={LOGO_USSS} alt="United States Secret Service"
                style={{ height:34, width:"auto", display:"block" }} />
            </div>
            <div>
              <div style={{ fontSize:11, letterSpacing:"0.08em", color:"#9FB2CC" }}>
                Registre des effectifs &amp; formations</div>
            </div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
            <span style={{ fontSize:11, fontWeight:600, padding:"4px 10px", borderRadius:99,
              background:SAVE_BADGE.bg, color:SAVE_BADGE.fg }}>{SAVE_BADGE.txt}</span>
            {editor && (
              <span style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:11, color:"#C8D4E5" }}>
                  ✎ {session.login}</span>
                <button onClick={doLogout}
                  style={{ padding:"4px 10px", fontSize:11, borderRadius:2,
                    background:"transparent", color:"#C8D4E5",
                    border:"1px solid #2C456B" }}>Déconnexion</button>
              </span>
            )}
            {agentLogged && (
              <span style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:11, color:"#C8D4E5" }}>
                  👮 {agentSession.matricule}</span>
                <button onClick={doLogoutAgent}
                  style={{ padding:"4px 10px", fontSize:11, borderRadius:2,
                    background:"transparent", color:"#C8D4E5",
                    border:"1px solid #2C456B" }}>Pointer sortie</button>
              </span>
            )}
            {(editor || agentLogged) && (
              <nav style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {(editor
                  ? [["accueil","Accueil"],["effectifs","Effectifs"],["pointeuse","Pointeuse"],["recap","Récap"],["rapports","Rapports"],["carte","Carte"],["journal","Journal"]]
                  : [["pointeuse","Pointeuse"],["rapports","Rapports"],["carte","Carte"]]
                ).map(([id,label]) => (
                  <button key={id} onClick={() => setPage(id)}
                    style={{ padding:"6px 16px", borderRadius:2, fontSize:13, fontWeight:600,
                      textTransform:"uppercase", letterSpacing:"0.05em",
                      ...(pageEffective === id
                        ? { background:C.gold, color:C.navyDeep }

                    {label}
                  </button>
                ))}
              </nav>
            )}
          </div>
        </div>
      </header>

      <main style={{ maxWidth:1120, margin:"0 auto", padding:"24px 20px" }}>
        {pageEffective === "accueil" && (
          <div style={{ display:"flex", flexDirection:"column", gap:24 }}>

              <StatCard label="Présents" value={presents.length} color={C.green} />
              <StatCard label="Absents" value={absents.length} color={C.amber} />
              <StatCard label="Mis à pied" value={misAPied.length} color={C.red} />
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))", gap:24 }}>

                <h2 style={{ fontSize:13, fontWeight:700, textTransform:"uppercase",
                  letterSpacing:"0.08em", marginBottom:12, color:C.navy }}>

                {presents.length === 0 &&

                <ul style={{ listStyle:"none", display:"flex", flexDirection:"column", gap:8 }}>
                  {sortMembers(presents).map(m => (
                    <li key={m.matricule} style={{ display:"flex", alignItems:"center", gap:12, fontSize:13 }}>
                      <BadgeMatricule value={m.matricule} onClick={() => setFicheMat(m.matricule)} />
                      <span style={{ fontWeight:500 }}>{m.grade}</span>
                      <span style={{ color:C.grey }}>
                        {(m.prenom || m.nom) ? `${m.prenom} ${m.nom}`.trim() : "—"}</span>
                    </li>
                  ))}
                </ul>
              </section>

              <section style={{ background:"#fff", borderRadius:6, padding:20,
                border:`1px solid ${C.line}`, display:"flex", flexDirection:"column", gap:12 }}>
                <h2 style={{ fontSize:13, fontWeight:700, textTransform:"uppercase",
                  letterSpacing:"0.08em", color:C.navy }}>Couverture des formations</h2>
                {[["formaInitiale","Forma. initiale"],["cpo","C.P.O"],["convoi","Convoi"],
                  ["sams","SAMS"],["ppa1","PPA I"],["permisVoiture","Permis voiture"],
                  ["permisHeli","Permis héli"]].map(([k,label]) => (
                  <CoverageBar key={k} label={label}
                    count={members.filter(m => m[k]).length} total={members.length} />

              </section>
            </div>

            <section style={{ background:"#fff", borderRadius:6, padding:20, border:`1px solid ${C.line}` }}>
              <h2 style={{ fontSize:13, fontWeight:700, textTransform:"uppercase",

                Répartition par grade</h2>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(210px, 1fr))", gap:8 }}>
                {GRADES.map(g => {
                  const n = members.filter(m => m.grade === g).length;
                  return (
                    <div key={g} style={{ display:"flex", alignItems:"center",
                      justifyContent:"space-between", gap:8, padding:"6px 10px",
                      borderRadius:3, fontSize:13,
                      background: n > 0 ? C.blueSoft : "#F6F7F9",
                      border:`1px solid ${C.line}`,
                      color: n > 0 ? C.ink : C.grey }}>
                      <span style={{ fontWeight:500 }}>{g}</span>
                      <span style={{ fontFamily:"monospace", fontWeight:700,
                        minWidth:24, textAlign:"center", borderRadius:2, padding:"1px 6px",
                        background: n > 0 ? C.blue : "#E2E6EC",
                        color: n > 0 ? "#fff" : C.grey }}>{n}</span>
                    </div>
                  );
                })}
              </div>
            </section>

            <section style={{ background:"#fff", borderRadius:6, padding:20, border:`1px solid ${C.line}` }}>
              <h2 style={{ fontSize:13, fontWeight:700, textTransform:"uppercase",
                letterSpacing:"0.08em", marginBottom:12, color:C.navy }}>
                Capacité opérationnelle (agents présents)</h2>
              <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                {APTITUDES.map(([label, test]) => (
                  <CoverageBar key={label} label={"Apte " + label}
                    count={presents.filter(test).length} total={presents.length} />
                ))}
              </div>
            </section>

            {misAPied.length > 0 && (
              <div style={{ borderRadius:6, padding:16, fontSize:13, display:"flex",
                alignItems:"center", gap:12, background:"#FBEDED",
                border:"1px solid #E5C5C5", color:C.red }}>
                <strong>⚠ Mesures disciplinaires en cours :</strong>
                {sortMembers(misAPied).map(m => m.matricule).join(", ")}
              </div>
            )}
          </div>
        )}

        {pageEffective === "effectifs" && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
              flexWrap:"wrap", gap:12 }}>
              <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                {Object.entries(VUES).map(([id, v]) => (
                  <button key={id} onClick={() => setVue(id)}
                    style={{ padding:"6px 12px", fontSize:13, borderRadius:2, fontWeight:600,
                      ...(vue === id
                        ? { background:C.blue, color:"#fff" }
                        : { background:"#fff", color:C.blue, border:`1px solid ${C.line}` }) }}>
                    {v.label}
                  </button>
                ))}
              </div>
              {editor && (
                <button onClick={() => { setShowAdd(true); setFormError(""); }}
                  style={{ padding:"6px 16px", fontSize:13, borderRadius:2, fontWeight:600,
                    color:"#fff", background:C.green }}>+ Recruter un membre</button>
              )}
            </div>

            <div style={{ background:"#fff", borderRadius:6, overflowX:"auto", border:`1px solid ${C.line}` }}>
              <table style={{ width:"100%", fontSize:13 }}>
                <thead>
                  <tr style={{ background:C.navy }}>
                    {["Matricule","Grade","Statut"].map(h => (
                      <th key={h} style={{ padding:"8px 12px", textAlign:"left", fontSize:11,
                        textTransform:"uppercase", letterSpacing:"0.05em", color:"#fff",
                        whiteSpace:"nowrap" }}>{h}</th>
                    ))}
                    {(vue === "perso" || vue === "tout") && PERSO_FIELDS.map(([k,label]) => (
                      <th key={k} style={{ padding:"8px 12px", textAlign:"left", fontSize:11,
                        textTransform:"uppercase", letterSpacing:"0.05em", color:"#fff",
                        whiteSpace:"nowrap" }}>{label}</th>
                    ))}
                    {vue === "aptitudes" && APTITUDES.map(([label]) => (
                      <th key={label} style={{ padding:"8px", textAlign:"center", fontSize:11,
                        textTransform:"uppercase", letterSpacing:"0.05em", color:"#fff",
                        whiteSpace:"nowrap" }}>{label}</th>
                    ))}
                    {vueActive.bool.map(([k,label]) => (
                      <th key={k} style={{ padding:"8px", textAlign:"center", fontSize:11,
                        textTransform:"uppercase", letterSpacing:"0.05em", color:"#fff",
                        whiteSpace:"nowrap" }}>{label}</th>
                    ))}
                    {editor && <th style={{ padding:"8px 12px", textAlign:"right", fontSize:11,
                      textTransform:"uppercase", letterSpacing:"0.05em", color:"#fff" }}>Actions</th>}
                  </tr>
                </thead>
                <tbody>
                  {sorted.map((m, idx) => (
                    <tr key={m.matricule} style={{ borderTop:`1px solid ${C.line}`,
                      background: idx % 2 ? "#FAFBFD" : "#fff" }}>
                      <td style={{ padding:"8px 12px" }}>
                        <BadgeMatricule value={m.matricule} onClick={() => setFicheMat(m.matricule)} /></td>
                      <td style={{ padding:"8px 12px", whiteSpace:"nowrap", fontWeight:500 }}>{m.grade}</td>
                      <td style={{ padding:"8px 12px" }}>
                        <StatutPill statut={m.statut} readonly={!editor}
                          onCycle={() => cycleStatut(m.matricule)} /></td>

                      {(vue === "perso" || vue === "tout") && PERSO_FIELDS.map(([k]) => (
                        <td key={k} style={{ padding:8 }}>
                          {editor ? (
                            <input style={inputStyle} defaultValue={m[k]} placeholder="—"
                              onBlur={e => { if (e.target.value !== m[k]) setPerso(m.matricule, k, e.target.value); }} />
                          ) : (
                            <span style={{ fontSize:13, color: m[k] ? C.ink : C.grey }}>{m[k] || "—"}</span>
                          )}
                        </td>
                      ))}

                      {vue === "aptitudes" && APTITUDES.map(([label, test]) => (
                        <td key={label} style={{ padding:8, textAlign:"center" }}>
                          <span style={{ fontWeight:700, fontSize:13,
                            color: test(m) ? C.green : "#D5DAE1" }}>{test(m) ? "✓" : "✕"}</span>
                        </td>
                      ))}

                      {vueActive.bool.map(([k]) => (
                        <td key={k} style={{ padding:8, textAlign:"center" }}>
                          <BoolCell value={m[k]} readonly={!editor}
                            onToggle={() => toggleBool(m.matricule, k)} />
                        </td>
                      ))}

                      {editor && (
                        <td style={{ padding:"8px 12px" }}>
                          <div style={{ display:"flex", alignItems:"center",
                            justifyContent:"flex-end", gap:4 }}>
                            <button onClick={() => promote(m.matricule, -1)}
                              disabled={GRADES.indexOf(m.grade) === 0}
                              title="Monter en grade"
                              style={{ width:28, height:28, borderRadius:2, fontWeight:700,
                                background:C.blueSoft, color:C.blue,
                                opacity: GRADES.indexOf(m.grade) === 0 ? 0.25 : 1 }}>▲</button>
                            <button onClick={() => promote(m.matricule, 1)}
                              disabled={GRADES.indexOf(m.grade) === GRADES.length - 1}
                              title="Descendre en grade"
                              style={{ width:28, height:28, borderRadius:2, fontWeight:700,
                                background:C.blueSoft, color:C.blue,
                                opacity: GRADES.indexOf(m.grade) === GRADES.length - 1 ? 0.25 : 1 }}>▼</button>
                            {confirmDelete === m.matricule ? (
                              <button onClick={() => removeMember(m.matricule)}
                                style={{ padding:"0 8px", height:28, borderRadius:2, fontSize:11,
                                  fontWeight:700, color:"#fff", background:C.red }}>Confirmer ?</button>
                            ) : (
                              <button onClick={() => setConfirmDelete(m.matricule)}
                                title="Retirer du registre"
                                style={{ width:28, height:28, borderRadius:2, fontWeight:700,
                                  background:"#F7E8E8", color:C.red }}>✕</button>

                          </div>

                    </tr>
                  ))}
                  {sorted.length === 0 && (
                    <tr><td colSpan={20} style={{ padding:"24px 16px", textAlign:"center", color:C.grey }}>

                </tbody>

            </div>
            {vue === "aptitudes" ? (

                  : "Mode lecture seule — connecte-toi en éditeur pour modifier le registre. Cliquer sur un matricule ouvre la fiche agent."}
              </p>
            )}

        {pageEffective === "pointeuse" && (() => {
          const filtre = normaliseMat(filtreMat);

          const visibles = (agentLogged && !editor)
            ? pointages.filter(p => normaliseMat(p.matricule) === normaliseMat(agentSession.matricule))
            : pointages;
          const listeAffichee = (editor && filtre)
            ? visibles.filter(p => normaliseMat(p.matricule).includes(filtre))
            : visibles;
          return (
            <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
              {/* ── Formulaire de pointage ── */}

                    <span style={{ fontSize:13, color:C.ink }}>
                      Connecte-toi en tant qu'agent pour enregistrer un service.

                      style={{ padding:"6px 14px", fontSize:12, fontWeight:600, borderRadius:2,

                ) : (
                  <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>

                    <div style={{ display:"grid",
